<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Proyecto – NEXXO.APP</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/theme.css">
<script src="/searchable-select.js" defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:#F0F2F8;color:#0F172A;min-height:100vh;}

header{background:#1C1F3B;padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.h-left{display:flex;align-items:center;gap:12px;}
.h-back{color:rgba(255,255,255,.5);font-size:12px;font-weight:500;text-decoration:none;border:1px solid rgba(255,255,255,.18);padding:5px 12px;border-radius:7px;transition:.15s;}
.h-back:hover{background:rgba(255,255,255,.1);color:#fff;}
.h-logo{height:32px;object-fit:contain;background:#fff;border-radius:6px;padding:3px 8px;}
.h-name{font-size:15px;font-weight:700;color:#fff;}
.h-tpl{font-size:10px;font-weight:600;padding:3px 9px;border-radius:10px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);}

.hero{padding:36px 24px 44px;text-align:center;}
.hero-inner{max-width:600px;margin:0 auto;}
.hero-logo{height:70px;object-fit:contain;margin-bottom:16px;display:none;}
.hero-name{font-size:26px;font-weight:800;color:#fff;margin-bottom:8px;}
.hero-sub{font-size:13px;color:rgba(255,255,255,.55);}

.main{max-width:800px;margin:0 auto;padding:28px 16px 60px;}

.section-card{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-md);border:1px solid var(--border);overflow:hidden;margin-bottom:18px;}
.sec-head{padding:18px 22px;border-bottom:1px solid #F0F1F5;display:flex;align-items:center;justify-content:space-between;}
.sec-title{font-size:14px;font-weight:700;color:#0F172A;display:flex;align-items:center;gap:8px;}
.sec-title .icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#0073EA;}
.sec-title .icon svg{width:17px;height:17px;}
.sec-body{padding:22px;}

.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.info-item{background:#F8F9FC;border-radius:10px;padding:14px 16px;}
.info-num{font-size:26px;font-weight:800;color:#0F172A;line-height:1;}
.info-label{font-size:11px;color:#64748B;margin-top:3px;}

.btn-action{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;text-decoration:none;}
.btn-action:hover{opacity:.85;}

.list-tags{display:flex;flex-wrap:wrap;gap:8px;}
.tag{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;background:#F0F2F8;color:#0F172A;}

.tpl-info{display:flex;align-items:center;gap:10px;padding:14px 16px;background:#F8F9FC;border-radius:10px;}
.tpl-info .badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-tigo{background:#EEF5FF;color:#0073EA;}
.badge-wom{background:#F3F0FF;color:#784BD1;}
.tpl-info p{font-size:12px;color:#64748B;}

.btn-nuevo-inf{
  width:100%;padding:16px;border-radius:12px;border:none;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;
  color:#fff;display:flex;align-items:center;justify-content:center;gap:10px;transition:.15s;
}
.btn-nuevo-inf:hover{opacity:.88;transform:translateY(-1px);}
.btn-nuevo-inf:active{transform:none;}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#0F172A;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:.3s;pointer-events:none;z-index:999;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:520px){.info-grid{grid-template-columns:1fr 1fr;}.h-name{font-size:13px;}}
</style>
</head>
<body>

<script src="/common.js"></script>
<script>
(function(){
  const t = localStorage.getItem('token') || sessionStorage.getItem('token');
  if (!t) { window.location.replace('/login'); throw ''; }
})();
</script>

<header id="mainHeader">
  <div class="h-left">
    <a href="/dashboard" class="ui-home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio</a>
    <img src="" class="h-logo" id="hLogo" alt="">
    <span class="h-name" id="hName">Cargando...</span>
  </div>
  <span class="h-tpl" id="hTpl">—</span>
</header>

<div id="heroWrap" style="display:none">
  <div class="hero" id="mainHero">
    <div class="hero-inner">
      <img src="" class="hero-logo" id="heroLogo" alt="">
      <div class="hero-name" id="heroName">—</div>
      <div class="hero-sub" id="heroSub">—</div>
    </div>
  </div>
</div>

<div class="main">

  <div class="section-card">
    <div class="sec-head">
      <div class="sec-title"><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>Resumen del proyecto</div>
    </div>
    <div class="sec-body">
      <div class="info-grid" id="infoGrid">
        <div class="info-item"><div class="info-num" id="infoSitios">—</div><div class="info-label">Sitios</div></div>
        <div class="info-item"><div class="info-num" id="infoSups">—</div><div class="info-label">Supervisores</div></div>
        <div class="info-item"><div class="info-num" id="infoTecs">—</div><div class="info-label">Técnicos</div></div>
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="sec-head">
      <div class="sec-title"><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg></div>Formato del informe</div>
    </div>
    <div class="sec-body">
      <div class="tpl-info" id="tplInfo">
        <span class="badge" id="tplBadge">—</span>
        <p id="tplDesc">—</p>
      </div>
    </div>
  </div>

  <div class="section-card" id="secSups" style="display:none">
    <div class="sec-head"><div class="sec-title"><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>Supervisores</div></div>
    <div class="sec-body"><div class="list-tags" id="listSups"></div></div>
  </div>

  <div class="section-card" id="secTecs" style="display:none">
    <div class="sec-head"><div class="sec-title"><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>Técnicos</div></div>
    <div class="sec-body"><div class="list-tags" id="listTecs"></div></div>
  </div>

  <div class="section-card" id="secSitios" style="display:none">
    <div class="sec-head">
      <div class="sec-title"><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>Sitios</div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span id="sitiosTotal" style="font-size:12px;color:#64748B"></span>
        <button id="btnAddSitios" onclick="abrirModalSitios()" style="display:none;background:#EEF5FF;color:#0073EA;border:1px solid #cfe2ff;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">+ Añadir sitios del catálogo</button>
      </div>
    </div>
    <div class="sec-body" style="padding:0;">
      <div style="max-height:260px;overflow-y:auto;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead><tr style="background:#F8F9FC;">
            <th style="padding:9px 18px;font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:left;border-bottom:1px solid #F0F1F5;">#</th>
            <th style="padding:9px 18px;font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:left;border-bottom:1px solid #F0F1F5;">Sitio</th>
            <th style="padding:9px 18px;font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:left;border-bottom:1px solid #F0F1F5;">Comuna</th>
            <th style="padding:9px 18px;font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:left;border-bottom:1px solid #F0F1F5;">Dirección</th>
          </tr></thead>
          <tbody id="tblSitios"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal: añadir sitios del catálogo a este proyecto -->
  <div id="modalSitios" style="display:none;position:fixed;inset:0;background:rgba(28,31,59,.55);z-index:300;align-items:center;justify-content:center;padding:20px;">
    <div style="background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:84vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;">
      <div style="padding:18px 22px;border-bottom:1px solid #F0F1F5;font-size:15px;font-weight:700;">Añadir sitios del catálogo</div>
      <div style="padding:12px 22px 0;"><input id="qSitios" type="text" placeholder="Buscar sitio, comuna o dirección…" oninput="renderCat()" style="width:100%;border:1.5px solid #E2E8F0;border-radius:9px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;background:#F6F7FB;"></div>
      <div style="padding:8px 22px;overflow-y:auto;flex:1;">
        <table style="width:100%;border-collapse:collapse;">
          <thead><tr style="background:#F8F9FC;">
            <th style="width:34px;padding:8px;border-bottom:1px solid #E2E8F0;"><input type="checkbox" id="catAll" onchange="catToggleAll(this)" style="width:16px;height:16px;accent-color:#0073EA;cursor:pointer;"></th>
            <th style="padding:8px;font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:left;border-bottom:1px solid #E2E8F0;">Sitio</th>
            <th style="padding:8px;font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:left;border-bottom:1px solid #E2E8F0;">Comuna</th>
            <th style="padding:8px;font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;text-align:left;border-bottom:1px solid #E2E8F0;">Dirección</th>
          </tr></thead>
          <tbody id="catBody"></tbody>
        </table>
        <div id="catEmpty" style="display:none;padding:30px;text-align:center;color:var(--faint);">No hay sitios que coincidan.</div>
      </div>
      <div style="padding:14px 22px;border-top:1px solid #F0F1F5;display:flex;justify-content:space-between;align-items:center;gap:10px;">
        <span id="catCount" style="font-size:12px;color:#64748B;">0 seleccionados</span>
        <div style="display:flex;gap:10px;">
          <button onclick="cerrarModalSitios()" style="background:#fff;border:1.5px solid #E2E8F0;color:#64748B;border-radius:9px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Cancelar</button>
          <button id="catConfirmar" onclick="confirmarSitios()" style="background:#0073EA;color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Añadir</button>
        </div>
      </div>
    </div>
  </div>

  <!-- CTA principal -->
  <button class="btn-nuevo-inf" id="btnNuevoInf" onclick="irAFormulario()">
    + Crear nuevo informe
  </button>

</div>
<div id="toast"></div>

<script>
const TOKEN = () => localStorage.getItem('token') || sessionStorage.getItem('token') || '';
const authH = (x={}) => ({ Authorization: 'Bearer ' + TOKEN(), ...x });

let proyConfig = null;
let miRol = '';
const NIVEL = { superadmin:4, admin_empresa:3, supervisor:2, tecnico:1 };
const puedeAsignar = () => (NIVEL[miRol]||0) >= 3;
const slug = location.pathname.split('/').pop();

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show';
  clearTimeout(el._t); el._t = setTimeout(() => el.className='', 2500);
}

async function init() {
  try {
    const [meR, pR] = await Promise.all([
      fetch('/auth/me', { headers: authH() }),
      fetch(`/api/proyectos/${slug}`, { headers: authH() })
    ]);
    if (!meR.ok) { window.location.replace('/login'); return; }
    if (!pR.ok) { toast('Proyecto no encontrado'); setTimeout(() => window.location.replace('/dashboard'), 1500); return; }

    try { miRol = (await meR.json()).usuario.rol || ''; } catch {}
    proyConfig = await pR.json();
    renderProyecto(proyConfig);
  } catch(e) { toast('Error: ' + e.message); }
}

function renderProyecto(p) {
  // Header
  document.title = p.nombre + ' – NEXXO.APP';
  document.getElementById('hName').textContent = p.nombre;
  document.getElementById('hTpl').textContent  = p.template === 'tigo' ? 'Formato Clima 1' : 'Formato Clima 2';
  if (p.logo) {
    const hl = document.getElementById('hLogo'); hl.src = p.logo; hl.style.display = 'block';
  }

  // Hero
  const heroColor = p.color || '#1C1F3B';
  const hero = document.getElementById('mainHero');
  hero.style.background = heroColor;
  document.getElementById('heroWrap').style.display = 'block';
  document.getElementById('heroName').textContent = p.nombre;
  document.getElementById('heroSub').textContent  = `Proyecto de mantenimiento · Formato ${p.template === 'tigo' ? 'Tigo' : 'WOM'}`;
  if (p.logo) {
    const hl = document.getElementById('heroLogo'); hl.src = p.logo; hl.style.display = 'block';
  }

  // Stats
  document.getElementById('infoSitios').textContent = p.sitios?.length || 0;
  document.getElementById('infoSups').textContent   = p.supervisores?.length || 0;
  document.getElementById('infoTecs').textContent   = p.tecnicos?.length || 0;

  // Template info
  const badge = document.getElementById('tplBadge');
  if (p.template === 'tigo') {
    badge.textContent = 'Formato Clima 1'; badge.className = 'badge badge-tigo';
    document.getElementById('tplDesc').textContent = 'Mantenimiento preventivo/correctivo con sala, equipo, mediciones técnicas, checklist y fotografías.';
  } else {
    badge.textContent = 'Formato Clima 2'; badge.className = 'badge badge-wom';
    document.getElementById('tplDesc').textContent = 'Tickets de servicio con N° de ticket, tipo de actividad, técnicos múltiples y fotografías.';
  }

  // Supervisores
  if (p.supervisores?.length) {
    document.getElementById('secSups').style.display = 'block';
    document.getElementById('listSups').innerHTML = p.supervisores.map(s => `<span class="tag">${s}</span>`).join('');
  }

  // Técnicos
  if (p.tecnicos?.length) {
    document.getElementById('secTecs').style.display = 'block';
    document.getElementById('listTecs').innerHTML = p.tecnicos.map(t => `<span class="tag">${t}</span>`).join('');
  }

  // Sitios — visible si hay sitios o si el rol puede asignar (para ver el botón)
  if (p.sitios?.length || puedeAsignar()) {
    document.getElementById('secSitios').style.display = 'block';
    renderSitios(p.sitios || []);
    if (puedeAsignar()) document.getElementById('btnAddSitios').style.display = 'inline-flex';
  }

  // CTA button
  const btn = document.getElementById('btnNuevoInf');
  btn.style.background = p.color || '#0073EA';
}


// Normaliza tupla [nombre, direccion, comuna] (compatible con [nombre, direccion])
function sitioTupla(s){ return Array.isArray(s) ? [s[0]||'', s[1]||'', s[2]||''] : [s.nombre||'', s.direccion||'', s.comuna||s.ciudad||'']; }

function renderSitios(sitios){
  document.getElementById('sitiosTotal').textContent = sitios.length + ' sitios';
  const tb = document.getElementById('tblSitios');
  if(!sitios.length){ tb.innerHTML = '<tr><td colspan="4" style="padding:18px;text-align:center;color:var(--faint);font-size:12px;">Sin sitios asignados todavía.</td></tr>'; return; }
  tb.innerHTML = sitios.map((s,i)=>{ const [n,d,c]=sitioTupla(s); return `
    <tr style="border-bottom:1px solid #F6F7FB;">
      <td style="padding:9px 18px;color:var(--faint);font-size:12px;">${i+1}</td>
      <td style="padding:9px 18px;font-weight:600;">${esc(n)}</td>
      <td style="padding:9px 18px;color:#64748B;font-size:12px;">${esc(c||'—')}</td>
      <td style="padding:9px 18px;color:#64748B;font-size:12px;">${esc(d||'—')}</td>
    </tr>`; }).join('');
}

// ── Modal: añadir sitios del catálogo ────────────────────────────
let CATALOGO = [];
let catSel = new Set();

async function abrirModalSitios(){
  document.getElementById('modalSitios').style.display='flex';
  if(!CATALOGO.length){
    try{
      const r = await fetch('/api/sitios-preventivos', { headers: authH() });
      CATALOGO = r.ok ? await r.json() : [];
    }catch{ CATALOGO=[]; }
  }
  catSel.clear();
  document.getElementById('qSitios').value='';
  renderCat();
}
function cerrarModalSitios(){ document.getElementById('modalSitios').style.display='none'; }

function catFiltrados(){
  const q=(document.getElementById('qSitios').value||'').trim().toLowerCase();
  return CATALOGO.map((s,i)=>({s,i})).filter(({s})=> !q || (s.nombre+' '+(s.ciudad||'')+' '+(s.direccion||'')).toLowerCase().includes(q));
}
function renderCat(){
  const rows=catFiltrados();
  document.getElementById('catBody').innerHTML = rows.map(({s,i})=>`
    <tr>
      <td style="padding:8px;border-bottom:1px solid #F6F7FB;"><input type="checkbox" data-i="${i}" ${catSel.has(i)?'checked':''} onchange="catToggle(this)" style="width:16px;height:16px;accent-color:#0073EA;cursor:pointer;"></td>
      <td style="padding:8px;border-bottom:1px solid #F6F7FB;font-weight:600;">${esc(s.nombre)}</td>
      <td style="padding:8px;border-bottom:1px solid #F6F7FB;color:#64748B;">${esc(s.ciudad||'—')}</td>
      <td style="padding:8px;border-bottom:1px solid #F6F7FB;color:#64748B;font-size:12px;">${esc(s.direccion||'—')}</td>
    </tr>`).join('');
  document.getElementById('catEmpty').style.display = rows.length?'none':'block';
  document.getElementById('catCount').textContent = catSel.size+' seleccionados';
  document.getElementById('catAll').checked = rows.length && rows.every(({i})=>catSel.has(i));
}
function catToggle(cb){ const i=+cb.dataset.i; cb.checked?catSel.add(i):catSel.delete(i); renderCat(); }
function catToggleAll(cb){ catFiltrados().forEach(({i})=> cb.checked?catSel.add(i):catSel.delete(i)); renderCat(); }

async function confirmarSitios(){
  if(!catSel.size){ toast('Selecciona al menos un sitio'); return; }
  const sitios=[...catSel].map(i=>{ const s=CATALOGO[i]; return { nombre:s.nombre, direccion:s.direccion||'', comuna:s.ciudad||'' }; });
  const btn=document.getElementById('catConfirmar'); btn.disabled=true;
  try{
    const r=await fetch(`/api/proyectos/${slug}/sitios`, { method:'POST', headers: authH({'Content-Type':'application/json'}), body: JSON.stringify({ sitios }) });
    const d=await r.json();
    if(!r.ok){ toast(d.error||'Error al añadir'); return; }
    toast(`${sitios.length} sitio(s) añadidos`);
    cerrarModalSitios();
    const pR=await fetch(`/api/proyectos/${slug}`, { headers: authH() });
    if(pR.ok){ proyConfig=await pR.json(); document.getElementById('infoSitios').textContent=proyConfig.sitios?.length||0; renderSitios(proyConfig.sitios||[]); }
  }catch(e){ toast('Error: '+e.message); }
  finally{ btn.disabled=false; }
}

function irAFormulario() {
  if (!proyConfig) return;
  // Guarda config en sessionStorage para que la página del formulario la cargue
  sessionStorage.setItem('proyConfig', JSON.stringify(proyConfig));
  const destino = proyConfig.template === 'tigo'
    ? `/proyecto-form/${proyConfig.slug}`
    : `/proyecto-form/${proyConfig.slug}`;
  window.location.href = destino;
}

init();
</script>
</body>
</html>
