<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Gestión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/theme.css">
<script src="/searchable-select.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── Paleta del panel · alias sobre el Design System central (theme.css) ──
   Los nombres --p-* se conservan, pero ahora resuelven a los tokens
   globales: el panel queda unificado con el resto de la app. ── */
:root{
  --p-navy:var(--sidebar); --p-accent:var(--primary); --p-accent-d:var(--primary-hover); --p-accent-soft:var(--info-soft); --p-accent-bd:#BFDBFE;
  --p-bg:var(--bg); --p-surface:var(--surface); --p-text:var(--text); --p-muted:var(--muted); --p-faint:var(--faint);
  --p-border:var(--border); --p-subtle:var(--surface-2);
  --p-green:var(--success); --p-green-soft:var(--success-soft); --p-red:var(--error); --p-red-soft:var(--error-soft); --p-red-bd:#FECACA;
  --p-amber:var(--warning-ink); --p-amber-soft:var(--warning-soft); --p-indigo:#4338CA; --p-indigo-soft:#EEF2FF;
  --p-sh:var(--sh-md);
  --p-sh-lg:var(--sh-lg);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font-body);background:var(--p-bg);color:var(--p-text);min-height:100vh;display:flex;}

/* Foco accesible para navegación con teclado */
a:focus-visible,button:focus-visible,.sb-item:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--p-accent);outline-offset:2px;}

/* ── SIDEBAR ── */
.sidebar{
  width:220px;background:var(--p-navy);min-height:100vh;flex-shrink:0;
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;
  transition:transform .25s;border-right:1px solid rgba(255,255,255,.06);
}
.sb-brand{padding:20px 20px 14px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-brand h2{color:#fff;font-size:16px;font-weight:800;letter-spacing:-.01em;}
.sb-brand span{color:rgba(255,255,255,.4);font-size:11px;font-weight:500;}
.sb-nav{flex:1;overflow-y:auto;padding:12px 10px;}
.sb-group-label{color:rgba(255,255,255,.3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:14px 12px 6px;}
.sb-item{
  display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:8px;
  color:rgba(255,255,255,.6);font-size:13px;font-weight:500;cursor:pointer;
  transition:background .15s,color .15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;font-family:inherit;
}
.sb-item{position:relative;}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff;}
/* Activo: fondo translúcido + barra indicadora al borde (igual que /dashboard) */
.sb-item.active{background:rgba(0,115,234,.22);color:#fff;font-weight:600;}
.sb-item.active::before{content:'';position:absolute;left:-10px;top:7px;bottom:7px;width:3px;border-radius:0 3px 3px 0;background:var(--p-accent);}
.sb-ico{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
/* Tamaño uniforme de TODOS los íconos del sidebar (robusto para futuros íconos) */
.sb-ico svg{width:18px;height:18px;display:block;margin:0 auto;}
.sb-home{text-decoration:none;background:rgba(255,255,255,.05);margin-bottom:10px;}
.sb-home:hover{background:rgba(255,255,255,.13);color:#fff;}
.sb-home .sb-ico{opacity:.85;}
.sb-foot{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);}
.sb-user{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:var(--p-accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.sb-uname{color:#fff;font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-urol{color:rgba(255,255,255,.4);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.sb-logout{display:block;width:100%;text-align:center;padding:9px;border-radius:8px;background:rgba(220,38,38,.15);color:#fca5a5;border:1px solid rgba(220,38,38,.25);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;transition:background .15s,color .15s;}
.sb-logout:hover{background:rgba(220,38,38,.3);color:#fff;}

/* ── MAIN ── */
.wrap{margin-left:220px;flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{background:var(--p-surface);border-bottom:1px solid var(--p-border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;}
.tb-title{font-size:15px;font-weight:800;color:var(--p-text);letter-spacing:-.01em;}
.tb-sub{font-size:12px;color:var(--p-muted);margin-top:1px;}
.menu-toggle{display:none;background:var(--p-navy);color:#fff;border:none;border-radius:8px;width:38px;height:38px;font-size:18px;cursor:pointer;}
.tb-home{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;background:var(--p-bg);color:var(--p-text);border:1px solid var(--p-border);font-size:13px;font-weight:700;font-family:inherit;text-decoration:none;cursor:pointer;transition:.15s;white-space:nowrap;}
.tb-home:hover{background:var(--p-accent-soft);border-color:var(--p-accent);color:var(--p-accent);}
.content{padding:24px 28px 60px;max-width:1180px;width:100%;margin:0 auto;}

/* ── CARDS / STATS — planas: borde y fondo, sin sombra ni lift
   (no son clicables; la elevación se reserva para modales y menús) ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--p-surface);border:1px solid var(--p-border);border-radius:var(--r-lg);padding:20px;}
.stat-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px;}
.stat-val{font-size:30px;font-weight:800;color:var(--p-text);line-height:1.05;letter-spacing:-.03em;font-variant-numeric:tabular-nums;}
.stat-label{font-size:11px;color:var(--p-muted);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.si-blue{background:var(--p-accent-soft);color:var(--p-accent);}.si-green{background:var(--p-green-soft);color:var(--p-green);}.si-purple{background:var(--p-indigo-soft);color:var(--p-indigo);}.si-orange{background:var(--p-amber-soft);color:var(--p-amber);}
.stat-ico svg{width:22px;height:22px;}

/* ── CHARTS ── */
.charts-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:16px;margin-bottom:22px;}
.chart-card{background:var(--p-surface);border:1px solid var(--p-border);border-radius:12px;padding:18px 20px;min-width:0;}
.chart-head{display:flex;align-items:baseline;gap:8px;margin-bottom:14px;}
.chart-title{font-size:13px;font-weight:800;color:var(--p-text);letter-spacing:-.01em;}
.chart-sub{font-size:11px;font-weight:600;color:var(--p-faint);margin-left:auto;}
.chart-box{position:relative;width:100%;height:220px;}
.chart-box.tall{height:300px;}
.chart-empty{display:flex;align-items:center;justify-content:center;height:220px;color:var(--p-faint);font-size:12.5px;text-align:center;}
@media(max-width:760px){.charts-grid{grid-template-columns:1fr;}}

/* ── CHIPS de acceso rápido (proyectos más usados) ── */
.proy-chips{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:14px 22px;border-bottom:1px solid var(--p-border);}
.chips-label{font-size:11px;font-weight:700;color:var(--p-faint);text-transform:uppercase;letter-spacing:.5px;}
.chip{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:20px;border:1.5px solid var(--p-border);background:var(--p-surface);color:var(--p-text);font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s,border-color .15s,color .15s;}
.chip:hover{border-color:var(--p-accent);color:var(--p-accent);background:var(--p-accent-soft);}
.chip.active{background:var(--p-accent);border-color:var(--p-accent);color:#fff;}
.chip-n{font-size:11px;font-weight:700;background:var(--p-subtle);color:var(--p-muted);border-radius:10px;padding:1px 7px;}
.chip:hover .chip-n{background:#fff;}
.chip.active .chip-n{background:rgba(255,255,255,.25);color:#fff;}

.empty-icon{color:var(--p-faint);}
.empty-icon svg{width:34px;height:34px;}
.tb-home svg{width:16px;height:16px;}

/* ── SECTION / TABLE — plana: borde sin sombra ── */
.section{background:var(--p-surface);border:1px solid var(--p-border);border-radius:12px;margin-bottom:20px;overflow:hidden;}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--p-border);flex-wrap:wrap;gap:12px;}
.sec-name{font-size:15px;font-weight:700;letter-spacing:-.01em;}
.sec-sub{font-size:12px;color:var(--p-muted);margin-top:1px;}
.sec-tools{display:flex;gap:16px;align-items:center;flex-wrap:nowrap;justify-content:flex-end;}
/* En barras de herramientas el select no debe expandirse al 100% (encimaba los botones) */
.sec-tools > *{flex:0 0 auto;}
.sec-tools .ss-wrap{width:auto!important;min-width:180px!important;max-width:230px!important;margin-right:10px;}
/* El script pone el botón en content-box (inline): con width:100% desbordaba
   sobre el elemento vecino. border-box lo encaja EXACTO en su wrapper. */
.sec-tools .ss-disp{width:100%;box-sizing:border-box!important;height:auto!important;}
.sec-tools select.filter{min-width:180px;max-width:230px;margin-right:10px;}
@media(max-width:640px){ .sec-tools{flex-wrap:wrap;} }
/* Selector "Empresa" junto al botón Guardar: sin tope de ancho se estiraba a
   flex:1 y en pantallas angostas el botón bajaba de línea justo debajo,
   quedando tapado por el propio desplegable al abrirse. */
.eq-emp-field{flex:0 1 360px;}
.eq-emp-field .ss-wrap{width:auto!important;min-width:220px!important;max-width:360px!important;}
.eq-emp-field .ss-disp{width:100%;box-sizing:border-box!important;height:auto!important;}
.btn{padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:background .15s,box-shadow .15s,transform .05s;display:inline-flex;align-items:center;gap:6px;}
.btn:active{transform:translateY(1px);}
.btn-blue{background:var(--p-accent);color:#fff;}.btn-blue:hover{background:var(--p-accent-d);}
.btn-green{background:var(--p-green);color:#fff;}.btn-green:hover{background:#047857;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-sm{padding:6px 11px;font-size:11px;border-radius:7px;}
.btn-ghost{background:var(--p-surface);color:var(--p-text);border:1px solid var(--p-border);}
.btn-ghost:hover{background:var(--p-subtle);border-color:#CBD5E1;}
.btn-del{background:var(--p-red-soft);color:var(--p-red);border:1px solid var(--p-red-bd);}
.btn-del:hover{background:#FEE2E2;}
select.filter,input.filter{border:1.5px solid var(--p-border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;color:var(--p-text);background:var(--p-surface);outline:none;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
select.filter:focus,input.filter:focus{border-color:var(--p-accent);box-shadow:0 0 0 3px rgba(0,115,234,.12);}

table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11px;font-weight:700;color:var(--p-muted);text-transform:uppercase;letter-spacing:.5px;padding:12px 22px;border-bottom:1px solid var(--p-border);background:var(--p-subtle);}
td{padding:13px 22px;font-size:13px;border-bottom:1px solid var(--p-border);color:var(--p-text);}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background .12s;}
tr:hover td{background:var(--p-subtle);}
.pill{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;background:var(--p-subtle);color:var(--p-muted);}
.pill-activo,.pill-aprobado{background:var(--p-green-soft);color:var(--p-green);}
.pill-pausado,.pill-borrador{background:var(--p-amber-soft);color:var(--p-amber);}
.pill-finalizado,.pill-enviado{background:var(--p-accent-soft);color:var(--p-accent);}
.pill-cancelado,.pill-rechazado,.pill-planificado{background:var(--p-subtle);color:var(--p-muted);}
.pill-superadmin{background:#FEF3C7;color:#B45309;}.pill-admin_empresa{background:var(--p-accent-soft);color:var(--p-accent);}
.pill-supervisor{background:var(--p-green-soft);color:var(--p-green);}.pill-tecnico{background:var(--p-indigo-soft);color:var(--p-indigo);}
.pill-correctivo{background:var(--p-accent-soft);color:var(--p-accent);}.pill-preventivo{background:var(--p-green-soft);color:var(--p-green);}.pill-temporal{background:var(--p-amber-soft);color:var(--p-amber);}
.empty-state{padding:44px;text-align:center;color:var(--p-muted);font-size:13px;}
.empty-icon{font-size:34px;margin-bottom:10px;opacity:.6;}
.muted{color:var(--p-faint);}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px);}
.modal-bg.open{display:flex;}
.modal-wrap{position:relative;width:100%;max-width:460px;border-radius:14px;overflow:hidden;background:var(--p-surface);border:1px solid var(--p-border);box-shadow:var(--p-sh-lg);}
.modal{background:transparent;border:none;border-radius:0;width:100%;box-shadow:none;padding:26px 24px;max-height:90vh;overflow-y:auto;}
.modal-x{position:absolute;top:13px;right:14px;z-index:5;width:30px;height:30px;border:none;border-radius:8px;background:transparent;color:var(--p-muted);font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
.modal-x:hover{background:rgba(15,23,42,.08);color:var(--p-text);}
.modal h3{font-size:17px;font-weight:800;margin-bottom:5px;letter-spacing:-.01em;}
.modal-sub{font-size:13px;color:var(--p-muted);margin-bottom:20px;}
/* Banner de cabecera del modal: franja sólida (sin degradado) a sangre completa */
.modal-head{display:flex;align-items:center;gap:14px;margin:-26px -24px 22px;padding:18px 24px;background:var(--p-accent-soft);border-bottom:1px solid var(--p-accent-bd);}
.modal-head .modal-sub{margin-bottom:0;color:var(--p-muted);}
.modal-head h3{margin-bottom:2px;}
.modal-ico{flex:none;width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--p-accent);color:#fff;}
.modal-ico svg{width:22px;height:22px;}
.ctx-box .ctx-ico svg{width:17px;height:17px;color:var(--p-muted);}
.field-row{display:flex;gap:12px;}
.field-row .field{flex:1;min-width:0;}
.ctx-box{display:flex;align-items:center;gap:11px;background:var(--p-subtle);border:1px solid var(--p-border);border-radius:10px;padding:11px 13px;margin-bottom:18px;}
.ctx-box .ctx-ico{flex:none;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--p-surface);border:1px solid var(--p-border);}
.ctx-box .ctx-name{font-weight:700;font-size:13px;color:var(--p-text);}
.ctx-box .ctx-rut{font-size:12px;color:var(--p-muted);}
.field{margin-bottom:14px;}
.field label{font-size:11px;font-weight:700;color:var(--p-muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--p-border);border-radius:8px;padding:10px 13px;font-size:14px;color:var(--p-text);font-family:inherit;background:var(--p-surface);outline:none;transition:border-color .15s,box-shadow .15s;}
.field textarea{min-height:90px;resize:vertical;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--p-accent);box-shadow:0 0 0 3px rgba(3,105,161,.12);}
.field .hint{font-size:11px;color:var(--p-faint);margin-top:5px;}
/* ── Logo del proyecto (editar proyecto) ── */
.logo-zone{border:2px dashed var(--p-border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;position:relative;background:var(--p-subtle);}
.logo-zone:hover{border-color:var(--p-accent);background:var(--p-accent-soft);}
.logo-zone.has{border-style:solid;border-color:var(--p-accent);background:var(--p-surface);}
.logo-zone input{display:none;}
.logo-ic{color:var(--p-faint);margin-bottom:6px;}
.logo-ic svg{width:26px;height:26px;}
.logo-hint{font-size:11px;color:var(--p-faint);}
.logo-preview{max-height:60px;max-width:180px;object-fit:contain;display:none;margin:0 auto;}
.logo-zone.has .logo-ic,.logo-zone.has .logo-hint{display:none;}
.logo-zone.has .logo-preview{display:block;}
.logo-clear{position:absolute;top:6px;right:6px;background:var(--p-red-soft);color:var(--p-red);border:1px solid var(--p-red-bd);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;display:none;z-index:2;}
.logo-zone.has .logo-clear{display:block;}
/* ── Campo de chips/etiquetas (multi-select de técnicos) ── */
.chips-dd{position:relative;}
.chips-box{display:flex;flex-wrap:wrap;gap:6px;align-items:center;min-height:44px;border:1.5px solid var(--p-border);border-radius:8px;padding:7px 9px;background:var(--p-surface);cursor:text;transition:border-color .15s,box-shadow .15s;}
.chips-box:focus-within{border-color:var(--p-accent);box-shadow:0 0 0 3px rgba(0,115,234,.12);}
.chip-tag{display:inline-flex;align-items:center;gap:5px;background:var(--p-accent-soft);color:var(--p-accent);border:1px solid var(--p-accent-bd);border-radius:999px;padding:3px 5px 3px 11px;font-size:12.5px;font-weight:600;}
.chip-tag button{border:none;background:none;cursor:pointer;color:var(--p-accent);font-size:12px;line-height:1;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0;}
.chip-tag button:hover{background:rgba(0,115,234,.18);}
.chips-input{flex:1;min-width:110px;border:none;outline:none;background:none;font-size:13.5px;font-family:inherit;color:var(--p-text);padding:4px 2px;}
.chips-menu{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--p-accent);border-radius:9px;box-shadow:var(--p-sh-lg);z-index:10;max-height:210px;overflow-y:auto;display:none;}
.chips-menu.open{display:block;}
.chips-opt{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid #F1F5F9;color:var(--p-text);}
.chips-opt:last-child{border-bottom:none;}
.chips-opt:hover{background:var(--p-accent-soft);}
.chips-opt.none{color:var(--p-faint);cursor:default;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:40px;}
.pw-eye{position:absolute;top:50%;right:8px;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:4px;color:var(--p-muted);}
.pw-eye:hover{color:var(--p-text);}
.modal-err{font-size:12px;color:var(--p-red);margin-bottom:12px;display:none;background:var(--p-red-soft);padding:9px 12px;border-radius:8px;border:1px solid var(--p-red-bd);}
.modal-actions{display:flex;gap:10px;margin-top:22px;justify-content:center;align-items:center;}
/* flex:1 → los botones se reparten el ancho en partes iguales (fila centrada
   y balanceada; el margin-right:auto inline del btn-del deja de tener efecto). */
.modal-actions button{flex:1;height:40px;white-space:nowrap;transition:background .15s,border-color .15s,box-shadow .15s,transform .1s;}
.modal-actions button:active{transform:translateY(1px);}
.btn-cancel{display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 18px;border-radius:10px;border:1.5px solid var(--p-border);background:var(--p-surface);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--p-muted);white-space:nowrap;}
.btn-cancel:hover{background:var(--p-subtle);border-color:#CBD5E1;color:var(--p-text);}
.btn-confirm{display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 22px;border-radius:10px;border:none;font-size:13px;font-weight:700;letter-spacing:.01em;cursor:pointer;font-family:inherit;color:#fff;background:var(--p-green);box-shadow:0 2px 8px rgba(5,150,105,.28);white-space:nowrap;}
.btn-confirm:hover{background:#047857;box-shadow:0 4px 14px rgba(5,150,105,.38);transform:translateY(-1px);}
.btn-confirm:active{transform:translateY(0);}
.btn-confirm:disabled{opacity:.5;cursor:not-allowed;box-shadow:none;transform:none;}
/* Acción destructiva dentro de modal-actions: misma altura que Cancelar/Guardar,
   pero con tratamiento "danger" (rojo suave) y separada a la izquierda. */
.modal-actions .btn-del{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  height:40px;padding:0 16px;border-radius:10px;font-size:13px;font-weight:600;
  border:1.5px solid var(--p-red-bd);
  cursor:pointer;font-family:inherit;
}
.modal-actions .btn-del svg{width:15px;height:15px;flex:none;}
.modal-actions .btn-del:hover{background:#FEE2E2;border-color:var(--p-red);box-shadow:0 3px 10px rgba(220,38,38,.16);transform:translateY(-1px);}
.modal-actions .btn-del:active{transform:translateY(0);}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--p-navy);color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.3s;pointer-events:none;z-index:999;box-shadow:var(--p-sh-lg);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{background:var(--p-green);}#toast.err{background:var(--p-red);}
.overlay{display:none;}

@media(max-width:840px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .wrap{margin-left:0;}
  .menu-toggle{display:block;}
  .overlay.open{display:block;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:40;}
}
@media(prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important;}
}

<body>

(function(){

<aside class="sidebar" id="sidebar">

<div class="modal-bg" id="modalBg"><div class="modal-wrap"><button class="modal-x" onclick="closeModal()" aria-label="Cerrar" title="Cerrar">✕</button><div class="modal" id="modalBox"></div></div></div>
<div id="toast"></div>

<script>
const T = () => localStorage.getItem('token') || sessionStorage.getItem('token') || '';
const aH = (x={}) => ({ Authorization:'Bearer '+T(), ...x });
const jH = () => aH({ 'Content-Type':'application/json' });
const $ = id => document.getElementById(id);
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const initials = n => (n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

let ME = null;

function toast(msg,type='ok'){const e=$('toast');e.textContent=msg;e.className='show '+type;clearTimeout(e._t);e._t=setTimeout(()=>e.className='',2600);}
function toggleMenu(open){$('sidebar').classList.toggle('open',open);$('overlay').classList.toggle('open',open);}

async function api(path, opts={}){
  const r = await fetch(path,{ headers: opts.body?jH():aH(), ...opts });
  if(r.status===401){ localStorage.removeItem('token');sessionStorage.removeItem('token');location.replace('/login');throw new Error('401'); }
  const data = await r.json().catch(()=>null);
  if(!r.ok) throw new Error((data&&data.error)||('Error '+r.status));
  return data;
}

// ── MENÚ por rol ───────────────────────────────────────────────
const ITEMS = {
  empresas:     { ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"/><path d="M9 8h1"/><path d="M9 12h1"/><path d="M9 16h1"/><path d="M14 8h1"/><path d="M14 12h1"/><path d="M14 16h1"/></svg>', label:'Empresas',   sub:'Crear y administrar empresas', grp:'Estructura' },
  proyectos:    { ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>', label:'Proyectos',  sub:'Proyectos por empresa',     grp:'Estructura' },
  'mis-proyectos':{ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>',label:'Mis proyectos',sub:'Proyectos asignados a ti',grp:'Estructura' },
  usuarios:     { ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>', label:'Usuarios',   sub:'Supervisores y técnicos',   grp:'Equipo' },
  asignaciones: { ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>', label:'Asignaciones',sub:'Quién trabaja en qué',     grp:'Equipo' },
  tecnicos:     { ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>', label:'Técnicos de mis proyectos', sub:'Equipo de tus proyectos', grp:'Equipo' },
  'mis-informes':{ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>', label:'Mis informes',sub:'Informes que registraste', grp:'Trabajo' },
  config:       { ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>', label:'Configuración',sub:'Ajustes generales',       grp:'Cuenta' },
};
const MENU = {
  superadmin:    ['empresas','proyectos','usuarios','asignaciones','config'],
  admin_empresa: ['empresas','proyectos','usuarios','asignaciones','config'],
  supervisor:    ['mis-proyectos','tecnicos'],
  tecnico:       ['mis-proyectos','mis-informes'],
};
// El dashboard único vive en /dashboard. Aquí, la vista inicial es el primer ítem del rol.
const inicioVista = () => (MENU[ME.rol] || ['config'])[0];
const ROL_LABEL = { superadmin:'Superadmin', admin_empresa:'Administrador', supervisor:'Supervisor', tecnico:'Técnico' };
const CAT_LABEL = { clima:'Clima', energia:'Energía', obras_civiles:'Obras Civiles (OOCC)' };
// Filas módulo legacy fijas (Tigo/WOM/Preventivo) dentro de la tabla proyectos:
// se excluyen de las pantallas de proyecto genérico (Asignaciones, "Asignar existente").
const MODULOS_FIJOS_TEMPLATES = ['tigo', 'wom', 'preventivo'];
const catOpciones = (sel) => Object.entries(CAT_LABEL)
  .map(([v,l])=>`<option value="${v}" ${sel===v?'selected':''}>${l}</option>`).join('');

function buildSidebar(){
  const items = MENU[ME.rol] || ['config'];
  // Botón fijo para volver al panel principal (/dashboard, el nodo central)
  let html = `<a class="sb-item sb-home" href="/dashboard" title="Ir al panel principal">
    <span class="sb-ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>Inicio</a>`;
  let lastGrp=null;
  items.forEach(id=>{
    const it = ITEMS[id]; if(!it) return;
    if(it.grp!==lastGrp){ html+=`<div class="sb-group-label">${it.grp}</div>`; lastGrp=it.grp; }
    const label = (id==='empresas' && ME.rol==='admin_empresa') ? 'Mi empresa' : it.label;
    html+=`<button class="sb-item" data-view="${id}" onclick="go('${id}')"><span class="sb-ico">${it.ico}</span>${label}</button>`;
  });
  $('sbNav').innerHTML = html;
}

function go(view){
  toggleMenu(false);
  if(location.hash.slice(1)!==view) history.replaceState(null,'','#'+view);
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  const it = ITEMS[view] || ITEMS[inicioVista()];
  $('tbTitle').textContent = it.label; $('tbSub').textContent = it.sub;
  $('content').innerHTML = '<div class="empty-state">Cargando…</div>';
  (VIEWS[view] || VIEWS[inicioVista()])();
}

// ════════════════════════════════════════════════════════════════
// VISTAS
// ════════════════════════════════════════════════════════════════
const VIEWS = {};

// ── Empresas / Clientes (superadmin) — LISTA ──
VIEWS.empresas = async () => {
  const esSuper = ME.rol==='superadmin';
  const list = await api('/api/empresas');
  window._empresasList = list;
  if(!esSuper){ $('tbTitle').textContent='Mi empresa'; $('tbSub').textContent='Datos, usuarios y proyectos'; }
  const tools = esSuper
    ? `<input class="filter" id="empSearch" placeholder="Buscar nombre o RUT…" oninput="renderEmpresasList()">
       <button class="btn btn-blue" onclick="modalEmpresa()">+ Nueva empresa</button>` : '';
  $('content').innerHTML = `<div class="section">
    <div class="sec-head">
      <div><div class="sec-name">${esSuper?'Empresas / Clientes':'Mi empresa'}</div><div class="sec-sub">${esSuper?list.length+' registradas':'Selecciona para ver el detalle'}</div></div>
      <div class="sec-tools">${tools}</div></div>
    <div id="empListBody"></div></div>`;
  renderEmpresasList();
};
function renderEmpresasList(){
  const esSuper = ME.rol==='superadmin';
  const q = ($('empSearch')?.value||'').toLowerCase();
  let list = (window._empresasList||[]);
  if(q) list = list.filter(e=>(e.nombre||'').toLowerCase().includes(q) || (e.rut_empresa||'').toLowerCase().includes(q));
  $('empListBody').innerHTML = list.length ? `<table><thead><tr>
      <th>Empresa</th><th>RUT</th><th>Usuarios</th><th>Proyectos</th><th>Estado</th><th></th></tr></thead><tbody>
    ${list.map(e=>`<tr style="cursor:pointer" onclick="verEmpresa('${e.id}')" title="Ver usuarios de ${esc(e.nombre)}">
      <td><b>${esc(e.nombre)}</b> <span class="muted">/${esc(e.slug)}</span></td>
      <td class="muted">${esc(e.rut_empresa||'—')}</td>
      <td>${e.total_usuarios}</td><td>${e.total_proyectos}</td>
      <td><span class="pill ${e.activa?'pill-activo':'pill-cancelado'}">${e.activa?'activa':'inactiva'}</span></td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();verEmpresa('${e.id}')">Ver</button>
        ${esSuper?`<button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();modalEditarEmpresa('${e.id}')">Editar</button>
        <button class="btn btn-sm ${e.activa?'btn-del':'btn-green'}" onclick="event.stopPropagation();toggleEmpresa('${e.id}',${e.activa?0:1})">${e.activa?'Desactivar':'Activar'}</button>`:''}
      </td></tr>`).join('')}
  </tbody></table>` : `<div class="empty-state"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"/><path d="M9 8h1"/><path d="M9 12h1"/><path d="M9 16h1"/><path d="M14 8h1"/><path d="M14 12h1"/><path d="M14 16h1"/></svg></div>${q?'Sin resultados.':'No hay empresas.'}</div>`;
}

// ── Empresas — DETALLE ──
async function verEmpresa(id){
  $('content').innerHTML = '<div class="empty-state">Cargando…</div>';
  const [emp, usuarios, proyectos, areas] = await Promise.all([
    api('/api/empresas/'+id), api('/api/empresas/'+id+'/usuarios'), api('/api/empresas/'+id+'/proyectos'),
    api('/auth/areas?empresa_id='+encodeURIComponent(id)).catch(()=>[])
  ]);
  $('tbTitle').textContent = emp.nombre; $('tbSub').textContent = 'Detalle de empresa';
  const userRows = usuarios.length ? `<table><thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th></th></tr></thead><tbody>
    ${usuarios.map(u=>`<tr><td><b>${esc(u.nombre)}</b></td><td class="muted">${esc(u.email)}</td>
      <td><span class="pill pill-${u.rol}">${ROL_LABEL[u.rol]||u.rol}</span></td>
      <td style="text-align:right"><button class="btn btn-sm btn-ghost" onclick="reenviarInvitacion('${u.id}')">Reenviar invitación</button></td></tr>`).join('')}
    </tbody></table>` : `<div class="empty-state"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>Sin usuarios.</div>`;
  const puedeEditarProy = ['superadmin','admin_empresa'].includes(ME.rol);
  const projRows = proyectos.length ? `<table><thead><tr><th>Proyecto</th><th>Estado</th><th>Inicio</th><th>Creado</th>${puedeEditarProy?'<th></th>':''}</tr></thead><tbody>
    ${proyectos.map(p=>`<tr><td><b>${esc(p.nombre)}</b></td>
      <td><span class="pill pill-${p.estado||'activo'}">${esc(p.estado||'activo')}</span></td>
      <td class="muted">${p.fecha_inicio||'—'}</td><td class="muted">${(p.creado_en||'').slice(0,10)}</td>
      ${puedeEditarProy?`<td style="text-align:right"><button class="btn btn-sm btn-ghost" onclick="modalEditarProyecto('${p.id}','${emp.id}')">Editar</button></td>`:''}</tr>`).join('')}
    </tbody></table>` : `<div class="empty-state"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>Sin proyectos.</div>`;
  $('content').innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="go('empresas')" style="margin-bottom:16px">← Volver a empresas</button>
    <div class="section">
      <div class="sec-head"><div><div class="sec-name">Datos de la empresa</div><div class="sec-sub">/${esc(emp.slug)}</div></div>
        <div class="sec-tools"><span class="pill ${emp.activa?'pill-activo':'pill-cancelado'}">${emp.activa?'activa':'inactiva'}</span>
          <button class="btn btn-sm btn-blue" onclick="modalEditarEmpresa('${emp.id}')">Editar datos</button></div></div>
      <div style="padding:18px 22px;display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div><div class="sec-sub">Nombre</div><div style="font-weight:700;margin-top:2px">${esc(emp.nombre)}</div></div>
        <div><div class="sec-sub">Nombre de fantasía</div><div style="font-weight:700;margin-top:2px">${esc(emp.nombre_fantasia||'—')}</div></div>
        <div><div class="sec-sub">RUT empresa</div><div style="font-weight:700;margin-top:2px">${esc(emp.rut_empresa||'—')}</div></div>
        <div><div class="sec-sub">Contacto</div><div style="font-weight:700;margin-top:2px">${esc(emp.contacto||'—')}</div></div>
        <div><div class="sec-sub">Correo</div><div style="font-weight:700;margin-top:2px">${esc(emp.correo||'—')}</div></div>
        <div><div class="sec-sub">Dirección</div><div style="font-weight:700;margin-top:2px">${esc(emp.direccion||'—')}</div></div>
      </div></div>
    <div class="section">
      <div class="sec-head"><div><div class="sec-name">Áreas</div><div class="sec-sub">${areas.length}</div></div>
        ${['superadmin','admin_empresa'].includes(ME.rol)?`<button class="btn btn-ghost btn-sm" onclick="modalNuevaArea('${emp.id}')">+ Nueva área</button>`:''}</div>
      ${areas.length ? `<div style="padding:14px 22px;display:flex;gap:8px;flex-wrap:wrap;">${areas.map(a=>`<span class="pill">${esc(a.nombre)}</span>`).join('')}</div>`
        : `<div class="empty-state"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg></div>Sin áreas.</div>`}</div>
    <div class="section">
      <div class="sec-head"><div><div class="sec-name">Usuarios</div><div class="sec-sub">${usuarios.length}</div></div>
        <button class="btn btn-green btn-sm" onclick="modalUsuarioEmpresa('${emp.id}','${esc(emp.nombre)}')">+ Nuevo usuario</button></div>
      ${userRows}</div>
    <div class="section">
      <div class="sec-head"><div><div class="sec-name">Proyectos</div><div class="sec-sub">${proyectos.length}</div></div>
        <div class="sec-tools">
        ${ME.rol==='superadmin'?`<button class="btn btn-ghost btn-sm" onclick="modalAsignarProyectoExistente('${emp.id}')">Asignar proyecto existente</button>`:''}
        ${['superadmin','admin_empresa'].includes(ME.rol)?`<button class="btn btn-blue btn-sm" onclick="location.href='/nuevo-proyecto?empresa=${emp.id}'">+ Nuevo proyecto</button>`:''}
        </div></div>
      ${projRows}</div>`;

    <div class="sec-head"><div><div class="sec-name">${titulo}</div><div class="sec-sub">${arr.length} asignado${arr.length!==1?'s':''}</div></div>

      ${arr.map(p=>`<tr><td><b>${esc(p.nombre)}</b></td>
        <td><span class="pill pill-${p.rol}">${ROL_LABEL[p.rol]||p.rol}</span></td>
        <td><span class="pill pill-${p.rol_en_proyecto}">${p.rol_en_proyecto}</span></td>
        <td style="text-align:right"><button class="btn btn-sm btn-del" onclick="quitarAsignacion('${pid}','${p.id}','${esc(p.nombre)}')">Quitar</button></td></tr>`).join('')}
    </tbody></table>` : `<div class="empty-state"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>Nadie asignado.</div>`}</div>`;

async function loadTecnicos(){
  const pid = $('tProy').value; if(!pid){ $('tBody').innerHTML=`<div class="empty-state"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>Selecciona un proyecto.</div>`; return; }
  $('tBody').innerHTML = '<div class="empty-state">Cargando…</div>';
  // Cruce: equipo del proyecto + informes (cada informe trae tecnico_id, estado y fecha)
  const [personal, informes] = await Promise.all([
    api('/api/gestion/proyectos/'+pid+'/personal'),
    api('/api/gestion/proyectos/'+pid+'/informes').catch(()=>[])
  ]);
  if(!personal.length){
    $('tBody').innerHTML = `<div class="empty-state"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>Sin equipo en este proyecto.</div>`;
    return;
  }
  // Agrupar informes por técnico
  const yM = new Date().toISOString().slice(0,7);
  const porTec = {}; // tecnico_id -> [informes]
  (informes||[]).forEach(i=>{ if(!i.tecnico_id) return; (porTec[i.tecnico_id] = porTec[i.tecnico_id] || []).push(i); });
  window._tecInformes = porTec;

  // ── Métrica del equipo ──
  const conTec   = (informes||[]).filter(i=>i.tecnico_id);
  const totalEq  = conTec.length;
  const mesEq    = conTec.filter(i=>(i.fecha_creacion||'').slice(0,7)===yM).length;
  const tecnicos = personal.filter(p=>p.rol_en_proyecto==='tecnico');

// ── Campo de chips para asignar técnicos ─────────────────────────
let _chAll = [], _chSel = new Set(), _chInitial = new Set();
async function chLoadTecnicos(empresaId){
  try{
    const users = empresaId ? await api('/api/empresas/'+empresaId+'/usuarios') : await api('/auth/personal');
    return (users||[]).filter(u=>u.rol==='tecnico').map(u=>({id:u.id, nombre:u.nombre}));
  }catch{ return []; }
}
function chSetup(tecnicos, selectedIds){
  _chAll = tecnicos||[]; _chSel = new Set(selectedIds||[]); _chInitial = new Set(selectedIds||[]);
  chRender();
}
function chRender(){
  const box = $('chipsBox'); if(!box) return;
  const chips = [..._chSel].map(id=>{
    const t=_chAll.find(x=>x.id===id); if(!t) return '';
    return `<span class="chip-tag">${esc(t.nombre)}<button type="button" title="Quitar" onclick="chDel('${id}')">✕</button></span>`;
  }).join('');
  box.innerHTML = chips + `<input class="chips-input" id="chipsInput" placeholder="${_chSel.size?'Agregar otro…':'Buscar técnico…'}" autocomplete="off">`;
  const inp=$('chipsInput'); if(!inp) return;
  inp.addEventListener('input', e=>chFilter(e.target.value));
  inp.addEventListener('focus', e=>chFilter(e.target.value));
  inp.addEventListener('blur', ()=>setTimeout(()=>{ const m=$('chipsMenu'); if(m) m.classList.remove('open'); },160));
}
function chFilter(q){
  const menu=$('chipsMenu'); if(!menu) return;
  const nq=(q||'').toLowerCase();
  const opts=_chAll.filter(t=>!_chSel.has(t.id) && (t.nombre||'').toLowerCase().includes(nq));
  menu.innerHTML = opts.length
    ? opts.slice(0,40).map(t=>`<div class="chips-opt" onmousedown="event.preventDefault();chAdd('${t.id}')">${esc(t.nombre)}</div>`).join('')
    : `<div class="chips-opt none">${_chAll.length?'Sin coincidencias':'No hay técnicos en la empresa'}</div>`;
  menu.classList.add('open');
}
function chAdd(id){ _chSel.add(id); chRender(); const i=$('chipsInput'); if(i) i.focus(); chFilter(''); }
function chDel(id){ _chSel.delete(id); chRender(); }
// Aplica altas/bajas de asignaciones (rol técnico) al proyecto.
async function chSync(pid){
  const add=[..._chSel].filter(id=>!_chInitial.has(id));
  const del=[..._chInitial].filter(id=>!_chSel.has(id));
  for(const id of add) await api('/api/gestion/proyectos/'+pid+'/asignaciones',{method:'POST',body:JSON.stringify({usuario_id:id, rol_en_proyecto:'tecnico'})});
  for(const id of del) await api('/api/gestion/proyectos/'+pid+'/asignaciones/'+id,{method:'DELETE'});
}

let _epLogo = null, _epLogoOriginal = null;
function handleLogoEdit(e){
  const file = e.target.files[0]; if(!file) return;
  if(file.size > 2*1024*1024){ toast('Imagen demasiado grande (máx. 2 MB)','err'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    _epLogo = ev.target.result;
    $('ePLogoPreview').src = _epLogo;
    $('ePLogoZone').classList.add('has');
  };
  reader.readAsDataURL(file);
}
function clearLogoEdit(e){
  e.stopPropagation();
  _epLogo = null;
  $('ePLogoPreview').src = '';
  $('ePLogoZone').classList.remove('has');

async function descargarPlantillaUsuarios(btn){
  btn.disabled=true;
  try{
    const r = await fetch('/api/usuarios/plantilla',{ headers: aH() });
    if(!r.ok) throw new Error('No se pudo descargar la plantilla');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='plantilla-usuarios.xlsx'; a.click();
    URL.revokeObjectURL(url);
  }catch(e){ showErr(e.message); } finally{ btn.disabled=false; }

async function importarUsuarios(btn){
  const file = $('impFile').files[0];
  if(!file) return showErr('Selecciona el archivo .xlsx completado');
  btn.disabled=true;
  try{
    const dataBase64 = await new Promise((res,rej)=>{
      const fr=new FileReader();
      fr.onload=()=>res(String(fr.result).split(',')[1]);
      fr.onerror=()=>rej(new Error('No se pudo leer el archivo'));
      fr.readAsDataURL(file);
    });
    const r = await api('/api/usuarios/importar',{method:'POST',body:JSON.stringify({dataBase64})});
    const okRows = r.creados.map(c=>`<tr><td>${c.fila}</td><td>${esc(c.nombre)}</td><td class="muted">${esc(c.email)}</td><td><span class="pill pill-${c.rol}">${ROL_LABEL[c.rol]||c.rol}</span></td><td>${c.proyecto?`<span class="pill">${esc(c.proyecto)}</span>`:'<span class="muted">—</span>'}</td><td class="muted">${esc(c.password_temporal)}</td></tr>`).join('');
    const errRows = r.errores.map(e=>`<tr><td>${e.fila}</td><td>${esc(e.nombre)}</td><td colspan="4" style="color:var(--p-red)">${esc(e.error)}</td></tr>`).join('');
    $('impResult').innerHTML = `<div class="hint" style="margin:12px 0 6px">✅ Creados: <b>${r.creados.length}</b> · ❌ Con error: <b>${r.errores.length}</b></div>
      ${(okRows||errRows)?`<div style="max-height:240px;overflow:auto;border:1px solid var(--p-border);border-radius:8px">
        <table style="margin:0"><thead><tr><th>Fila</th><th>Nombre</th><th>Email / Detalle</th><th>Rol</th><th>Proyecto</th><th>Clave temp.</th></tr></thead>
        <tbody>${okRows}${errRows}</tbody></table></div><div class="hint" style="margin-top:6px">Entrega a cada usuario su email y clave temporal; deberá cambiarla al ingresar.</div>`:''}`;
    if(r.creados.length){ toast(`${r.creados.length} usuario(s) creado(s)`,'ok'); window._usuarios=null; }
    btn.disabled=false;
  }catch(e){ showErr(e.message); btn.disabled=false; }
}

  const proy = window._equipoProy || await api('/api/gestion/proyectos/'+pid);
  // Regla 2: solo técnicos/supervisores activos de la empresa del proyecto
  let usuarios = (await api('/auth/usuarios')).filter(u=>['supervisor','tecnico'].includes(u.rol)&&u.activo);
  if (proy.empresa_id) usuarios = usuarios.filter(u=>u.empresa_id===proy.empresa_id);
  if(!usuarios.length){
    openModal(`<h3>Sin usuarios disponibles</h3><p class="modal-sub">No hay supervisores ni técnicos en la empresa de este proyecto. Crea usuarios primero en la sección Usuarios.</p>
      <div class="modal-actions"><button class="btn-confirm" onclick="closeModal()">Entendido</button></div>`);
    return;
  }
  const rolDef = rolProyecto || 'tecnico';
  // El usuario a asignar debe coincidir con el rol elegido en el proyecto:
  // técnico → técnicos; supervisor/responsable → supervisores.
  window._asignUsuarios = usuarios;
  openModal(`<h3>Asignar al proyecto</h3><p class="modal-sub">Vincula a alguien a "${esc(proy.nombre)}".</p>
    <div class="field"><label>Usuario</label><select id="mAUser">${opcionesUsuarioAsignar(rolDef)}</select></div>
    <div class="field"><label>Rol en el proyecto</label><select id="mARol" onchange="onCambioRolAsignar()">
      <option value="tecnico" ${rolDef==='tecnico'?'selected':''}>Técnico</option>
      <option value="supervisor" ${rolDef==='supervisor'?'selected':''}>Supervisor</option>
      <option value="responsable" ${rolDef==='responsable'?'selected':''}>Responsable</option></select></div>
    <div class="modal-err" id="mErr"></div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmAsignar('${pid}',this)">Asignar</button></div>`);
}
// Roles de usuario válidos para cada rol en el proyecto.
const rolesUsuarioPara = rolProy => rolProy==='tecnico' ? ['tecnico'] : ['supervisor'];
function opcionesUsuarioAsignar(rolProy){
  const permit = rolesUsuarioPara(rolProy);
  const filtrados = (window._asignUsuarios||[]).filter(u=>permit.includes(u.rol));
  if(!filtrados.length)
    return `<option value="" disabled selected>— Sin ${rolProy==='tecnico'?'técnicos':'supervisores'} disponibles —</option>`;
  return filtrados.map(u=>`<option value="${u.id}">${esc(u.nombre)} (${ROL_LABEL[u.rol]})</option>`).join('');
}
function onCambioRolAsignar(){
  const sel=$('mAUser'); if(sel) sel.innerHTML=opcionesUsuarioAsignar($('mARol').value);
}
async function confirmAsignar(pid,btn){
  const usuario_id=$('mAUser').value, rol_en_proyecto=$('mARol').value;
  if(!usuario_id) return showErr('Selecciona un usuario');
  btn.disabled=true;
  try{ await api('/api/gestion/proyectos/'+pid+'/asignaciones',{method:'POST',body:JSON.stringify({usuario_id,rol_en_proyecto})});
    closeModal(); toast('Usuario asignado','ok'); gestionarEquipo(pid);
  }catch(e){ showErr(e.message); btn.disabled=false; }
}
function quitarAsignacion(pid,uid,nombre){
  openModal(`<h3>¿Quitar del proyecto?</h3><p class="modal-sub">"${nombre}" dejará de estar asignado.</p>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" style="background:var(--p-red)" onclick="confirmQuitar('${pid}','${uid}',this)">Sí, quitar</button></div>`);
}
async function confirmQuitar(pid,uid,btn){
  btn.disabled=true;
  try{ await api('/api/gestion/proyectos/'+pid+'/asignaciones/'+uid,{method:'DELETE'});
    closeModal(); toast('Asignación eliminada','ok'); gestionarEquipo(pid);
  }catch(e){ toast(e.message,'err'); closeModal(); }
}

function showErr(msg){ const e=$('mErr'); if(e){ e.textContent=msg; e.style.display='block'; } }
function togglePw(id,btn){ const i=$(id); if(!i) return; if(i.type==='password'){ i.type='text'; btn.textContent='🙈'; } else { i.type='password'; btn.textContent='👁'; } }

// INIT
// ════════════════════════════════════════════════════════════════
$('btnLogout').addEventListener('click',()=>{ localStorage.removeItem('token');sessionStorage.removeItem('token');location.replace('/login'); });

(async function init(){
  try{
    const { usuario } = await api('/auth/me');
    ME = usuario;
    $('brandRol').textContent = ROL_LABEL[ME.rol]||ME.rol;
    $('sbAvatar').textContent = initials(ME.nombre);
    $('sbUname').textContent = ME.nombre;
    $('sbUrol').textContent = ROL_LABEL[ME.rol]||ME.rol;
    buildSidebar();
    // Abre la sección del hash si es válida para el rol; si no, la vista inicial
    const hash = location.hash.slice(1);
    const detEmp = hash.match(/^empresa:(.+)$/);
    if (detEmp && ME.rol === 'superadmin') {
      document.querySelectorAll('.sb-item').forEach(b=>b.classList.toggle('active',b.dataset.view==='empresas'));
      verEmpresa(detEmp[1]);
    } else {
      const permitido = (MENU[ME.rol]||[]).includes(hash);
      go(permitido ? hash : inicioVista());
    }
  }catch(e){ /* api() ya redirige en 401 */ }
})();
</script>
