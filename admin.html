<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Gestión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/theme.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Poppins',system-ui,sans-serif;background:#F6F7FB;color:#323338;min-height:100vh;display:flex;}

/* ── SIDEBAR ── */
.sidebar{
  width:220px;background:#1C1F3B;min-height:100vh;flex-shrink:0;
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;
  transition:transform .25s;
}
.sb-brand{padding:20px 20px 14px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-brand h2{color:#fff;font-size:16px;font-weight:800;}
.sb-brand span{color:rgba(255,255,255,.4);font-size:11px;font-weight:500;}
.sb-nav{flex:1;overflow-y:auto;padding:12px 10px;}
.sb-group-label{color:rgba(255,255,255,.3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:14px 12px 6px;}
.sb-item{
  display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:8px;
  color:rgba(255,255,255,.55);font-size:13px;font-weight:500;cursor:pointer;
  transition:.15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;font-family:inherit;
}
.sb-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9);}
.sb-item.active{background:rgba(0,115,234,.22);color:#fff;font-weight:600;}
.sb-ico{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
/* Tamaño uniforme de TODOS los íconos del sidebar (robusto para futuros íconos) */
.sb-ico svg{width:18px;height:18px;display:block;margin:0 auto;}
.sb-home{text-decoration:none;background:rgba(255,255,255,.05);margin-bottom:10px;}
.sb-home:hover{background:rgba(255,255,255,.13);color:#fff;}
.sb-home .sb-ico{opacity:.85;}
.sb-foot{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);}
.sb-user{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:#0073EA;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.sb-uname{color:#fff;font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-urol{color:rgba(255,255,255,.4);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.sb-logout{display:block;width:100%;text-align:center;padding:9px;border-radius:8px;background:rgba(226,68,92,.15);color:#ff8a9b;border:1px solid rgba(226,68,92,.25);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;}
.sb-logout:hover{background:rgba(226,68,92,.25);}

/* ── MAIN ── */
.wrap{margin-left:220px;flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{background:#fff;border-bottom:1px solid #E6E9EF;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;}
.tb-title{font-size:15px;font-weight:800;color:#323338;}
.tb-sub{font-size:12px;color:#676879;margin-top:1px;}
.menu-toggle{display:none;background:#1C1F3B;color:#fff;border:none;border-radius:8px;width:38px;height:38px;font-size:18px;cursor:pointer;}
.tb-home{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;background:#F6F7FB;color:#323338;border:1px solid #E6E9EF;font-size:13px;font-weight:700;font-family:inherit;text-decoration:none;cursor:pointer;transition:.15s;white-space:nowrap;}
.tb-home:hover{background:#EEF5FF;border-color:#0073EA;color:#0073EA;}
.content{padding:24px 28px 60px;max-width:1100px;width:100%;}

/* ── CARDS / STATS ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.05);}
.stat-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px;}
.stat-val{font-size:28px;font-weight:800;color:#323338;line-height:1;}
.stat-label{font-size:12px;color:#676879;margin-top:5px;font-weight:600;}
.si-blue{background:#EEF5FF;color:#0073EA;}.si-green{background:#EDFFF6;color:#00A862;}.si-purple{background:#F3F0FF;color:#6161FF;}.si-orange{background:#FFF6ED;color:#E8910A;}
.stat-ico svg{width:22px;height:22px;}
.empty-icon{color:#A0A3B1;}
.empty-icon svg{width:34px;height:34px;}
.tb-home svg{width:16px;height:16px;}

/* ── SECTION / TABLE ── */
.section{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.05);margin-bottom:20px;overflow:hidden;}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #E6E9EF;flex-wrap:wrap;gap:12px;}
.sec-name{font-size:15px;font-weight:700;}
.sec-sub{font-size:12px;color:#676879;margin-top:1px;}
.sec-tools{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.btn{padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-blue{background:#0073EA;color:#fff;}.btn-green{background:#00C875;color:#fff;}
.btn:hover{opacity:.88;}.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-sm{padding:6px 11px;font-size:11px;border-radius:7px;}
.btn-ghost{background:#F6F7FB;color:#676879;border:1px solid #E6E9EF;}
.btn-del{background:#fef2f2;color:#E2445C;border:1px solid #fca5a5;}
.btn-del:hover{background:#fee2e2;opacity:1;}
select.filter,input.filter{border:1.5px solid #E6E9EF;border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;color:#323338;background:#fff;outline:none;}
select.filter:focus,input.filter:focus{border-color:#0073EA;}

table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11px;font-weight:700;color:#676879;text-transform:uppercase;letter-spacing:.5px;padding:12px 22px;border-bottom:1px solid #E6E9EF;background:#FAFBFC;}
td{padding:13px 22px;font-size:13px;border-bottom:1px solid #F0F1F5;color:#323338;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FAFBFC;}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.pill-activo,.pill-aprobado{background:#EDFFF6;color:#00A862;}
.pill-pausado,.pill-borrador{background:#FFF6ED;color:#E8910A;}
.pill-finalizado,.pill-enviado{background:#EEF5FF;color:#0073EA;}
.pill-cancelado,.pill-rechazado,.pill-planificado{background:#F6F7FB;color:#676879;}
.pill-superadmin{background:#FFF7E0;color:#C99400;}.pill-admin_empresa{background:#EEF5FF;color:#0073EA;}
.pill-supervisor{background:#EDFFF6;color:#00A862;}.pill-tecnico{background:#F3F0FF;color:#6161FF;}
.empty-state{padding:44px;text-align:center;color:#676879;font-size:13px;}
.empty-icon{font-size:34px;margin-bottom:10px;opacity:.6;}
.muted{color:#A0A3B1;}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:26px 24px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:17px;font-weight:800;margin-bottom:5px;}
.modal-sub{font-size:13px;color:#676879;margin-bottom:20px;}
.modal-head{display:flex;align-items:center;gap:13px;margin-bottom:20px;}
.modal-head .modal-sub{margin-bottom:0;}
.modal-head h3{margin-bottom:2px;}
.modal-ico{flex:none;width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;background:linear-gradient(135deg,#0073EA,#784BD1);color:#fff;box-shadow:0 4px 12px rgba(0,115,234,.3);}
.field-row{display:flex;gap:12px;}
.field-row .field{flex:1;min-width:0;}
.ctx-box{display:flex;align-items:center;gap:11px;background:#F6F7FB;border:1px solid #E6E9EF;border-radius:10px;padding:11px 13px;margin-bottom:18px;}
.ctx-box .ctx-ico{flex:none;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;background:#fff;border:1px solid #E6E9EF;}
.ctx-box .ctx-name{font-weight:700;font-size:13px;color:#323338;}
.ctx-box .ctx-rut{font-size:12px;color:#676879;}
.field{margin-bottom:14px;}
.field label{font-size:11px;font-weight:700;color:#676879;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;border:1.5px solid #E6E9EF;border-radius:8px;padding:10px 13px;font-size:14px;color:#323338;font-family:inherit;background:#fff;outline:none;transition:.15s;}
.field textarea{min-height:90px;resize:vertical;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#0073EA;box-shadow:0 0 0 3px rgba(0,115,234,.1);}
.field .hint{font-size:11px;color:#A0A3B1;margin-top:5px;}
.modal-err{font-size:12px;color:#E2445C;margin-bottom:12px;display:none;background:#fef2f2;padding:9px 12px;border-radius:8px;}
.modal-actions{display:flex;gap:10px;margin-top:6px;}
.btn-cancel{flex:1;padding:11px;border-radius:8px;border:1.5px solid #E6E9EF;background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#676879;}
.btn-confirm{flex:2;padding:11px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;background:#0073EA;}
.btn-confirm:disabled{opacity:.5;cursor:not-allowed;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#323338;color:#fff;padding:11px 22px;border-radius:22px;font-size:13px;font-weight:600;opacity:0;transition:.3s;pointer-events:none;z-index:999;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{background:#00C875;}#toast.err{background:#E2445C;}
.overlay{display:none;}

@media(max-width:840px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .wrap{margin-left:0;}
  .menu-toggle{display:block;}
  .overlay.open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;}
}
</style>
</head>
<body>

<script>
(function(){
  const token = localStorage.getItem('token') || sessionStorage.getItem('token');
  if (!token) { window.location.replace('/login'); throw ''; }
})();
</script>

<aside class="sidebar" id="sidebar">
  <div class="sb-brand"><h2>Panel de Gestión</h2><span id="brandRol">—</span></div>
  <nav class="sb-nav" id="sbNav"></nav>
  <div class="sb-foot">
    <div class="sb-user">
      <div class="sb-avatar" id="sbAvatar">–</div>
      <div style="min-width:0"><div class="sb-uname" id="sbUname">—</div><div class="sb-urol" id="sbUrol">—</div></div>
    </div>
    <a class="sb-logout" id="btnLogout">Cerrar sesión</a>
  </div>
</aside>
<div class="overlay" id="overlay" onclick="toggleMenu(false)"></div>

<div class="wrap">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px;">
      <button class="menu-toggle" onclick="toggleMenu(true)">☰</button>
      <a href="/dashboard" class="tb-home" title="Volver al inicio"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Inicio</a>
      <div><div class="tb-title" id="tbTitle">Dashboard</div><div class="tb-sub" id="tbSub">Resumen general</div></div>
    </div>
  </div>
  <div class="content" id="content"><div class="empty-state">Cargando…</div></div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>
<div id="toast"></div>

<script>
const T = () => localStorage.getItem('token') || sessionStorage.getItem('token') || '';
const aH = (x={}) => ({ Authorization:'Bearer '+T(), ...x });
const jH = () => aH({ 'Content-Type':'application/json' });
const $ = id => document.getElementById(id);
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const initials = n => (n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

let ME = null;

function toast(msg,type='ok'){const e=$('toast');e.textContent=msg;e.className='show '+type;clearTimeout(e._t);e._t=setTimeout(()=>e.className='',2600);}
function toggleMenu(open){$('sidebar').classList.toggle('open',open);$('overlay').classList.toggle('open',open);}

async function api(path, opts={}){
  const r = await fetch(path,{ headers: opts.body?jH():aH(), ...opts });
  if(r.status===401){ localStorage.removeItem('token');sessionStorage.removeItem('token');location.replace('/login');throw new Error('401'); }
  const data = await r.json().catch(()=>null);
  if(!r.ok) throw new Error((data&&data.error)||('Error '+r.status));
  return data;
}

// ── MENÚ por rol ───────────────────────────────────────────────
const ITEMS = {
  dashboard:    { ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>', label:'Dashboard',  sub:'Resumen general',           grp:'Inicio' },
  empresas:     { ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"/><path d="M9 8h1"/><path d="M9 12h1"/><path d="M9 16h1"/><path d="M14 8h1"/><path d="M14 12h1"/><path d="M14 16h1"/></svg>', label:'Empresas',   sub:'Crear y administrar empresas', grp:'Estructura' },
  proyectos:    { ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>', label:'Proyectos',  sub:'Proyectos por empresa',     grp:'Estructura' },
  'mis-proyectos':{ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>',label:'Mis proyectos',sub:'Proyectos asignados a ti',grp:'Estructura' },
  usuarios:     { ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>', label:'Usuarios',   sub:'Supervisores y técnicos',   grp:'Equipo' },
  asignaciones: { ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>', label:'Asignaciones',sub:'Quién trabaja en qué',     grp:'Equipo' },
  tecnicos:     { ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>', label:'Técnicos de mis proyectos', sub:'Equipo de tus proyectos', grp:'Equipo' },
  informes:     { ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>', label:'Informes',   sub:'Informes por proyecto',     grp:'Trabajo' },
  'mis-informes':{ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>', label:'Mis informes',sub:'Informes que registraste', grp:'Trabajo' },
  config:       { ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>', label:'Configuración',sub:'Ajustes generales',       grp:'Cuenta' },
  perfil:       { ico:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><circle cx="8" cy="10" r="2"/><path d="M14 9h4"/><path d="M14 13h4"/><path d="M6 16h6"/></svg>', label:'Mi perfil',  sub:'Tus datos personales',      grp:'Cuenta' },
};
const MENU = {
  superadmin:    ['dashboard','empresas','proyectos','usuarios','asignaciones','informes','config','perfil'],
  admin_empresa: ['dashboard','empresas','proyectos','usuarios','asignaciones','informes','config','perfil'],
  supervisor:    ['dashboard','mis-proyectos','tecnicos','informes','perfil'],
  tecnico:       ['dashboard','mis-proyectos','mis-informes','perfil'],
};
const ROL_LABEL = { superadmin:'Superadmin', admin_empresa:'Administrador', supervisor:'Supervisor', tecnico:'Técnico' };

function buildSidebar(){
  const items = MENU[ME.rol] || ['dashboard','perfil'];
  // Botón fijo para volver al panel principal (/dashboard, el nodo central)
  let html = `<a class="sb-item sb-home" href="/dashboard" title="Ir al panel principal">
    <span class="sb-ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>Inicio</a>`;
  let lastGrp=null;
  items.forEach(id=>{
    const it = ITEMS[id]; if(!it) return;
    if(it.grp!==lastGrp){ html+=`<div class="sb-group-label">${it.grp}</div>`; lastGrp=it.grp; }
    const label = (id==='empresas' && ME.rol==='admin_empresa') ? 'Mi empresa' : it.label;
    html+=`<button class="sb-item" data-view="${id}" onclick="go('${id}')"><span class="sb-ico">${it.ico}</span>${label}</button>`;
  });
  $('sbNav').innerHTML = html;
}

function go(view){
  toggleMenu(false);
  if(location.hash.slice(1)!==view) history.replaceState(null,'','#'+view);
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  const it = ITEMS[view] || ITEMS.dashboard;
  $('tbTitle').textContent = it.label; $('tbSub').textContent = it.sub;
  $('content').innerHTML = '<div class="empty-state">Cargando…</div>';
  (VIEWS[view] || VIEWS.dashboard)();
}

async function loadTecnicos(){
  const pid = $('tProy').value; if(!pid){ $('tBody').innerHTML=`<div class="empty-state"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>Selecciona un proyecto.</div>`; return; }
  $('tBody').innerHTML = '<div class="empty-state">Cargando…</div>';
  // Cruce: equipo del proyecto + informes (cada informe trae tecnico_id, estado y fecha)
  const [personal, informes] = await Promise.all([
    api('/api/gestion/proyectos/'+pid+'/personal'),
    api('/api/gestion/proyectos/'+pid+'/informes').catch(()=>[])
  ]);
  if(!personal.length){
    $('tBody').innerHTML = `<div class="empty-state"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>Sin equipo en este proyecto.</div>`;
    return;
  }
  // Agrupar informes por técnico
  const yM = new Date().toISOString().slice(0,7);
  const porTec = {}; // tecnico_id -> [informes]
  (informes||[]).forEach(i=>{ if(!i.tecnico_id) return; (porTec[i.tecnico_id] = porTec[i.tecnico_id] || []).push(i); });
  window._tecInformes = porTec;

  // ── Métrica del equipo ──
  const conTec   = (informes||[]).filter(i=>i.tecnico_id);
  const totalEq  = conTec.length;
  const mesEq    = conTec.filter(i=>(i.fecha_creacion||'').slice(0,7)===yM).length;
  const tecnicos = personal.filter(p=>p.rol_en_proyecto==='tecnico');
  const activos  = tecnicos.filter(t=>porTec[t.id]?.length).length;

    <div class="stat-card"><div class="stat-ico si-purple"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg></div><div class="stat-val">${totalEq}</div><div class="stat-label">Informes del equipo</div></div>
    <div class="stat-card"><div class="stat-ico si-green"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div class="stat-val">${mesEq}</div><div class="stat-label">Informes este mes</div></div>
    <div class="stat-card"><div class="stat-ico si-blue"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div class="stat-val">${activos}/${tecnicos.length}</div><div class="stat-label">Técnicos con informes</div></div>
  </div>`;

  const filas = personal.map(p=>{
    const arr = porTec[p.id] || [];
    const mes = arr.filter(i=>(i.fecha_creacion||'').slice(0,7)===yM).length;
    const tieneDetalle = arr.length > 0;
    return `<tr ${tieneDetalle?`style="cursor:pointer" onclick="toggleTecInformes('${p.id}')" title="Ver informes de ${esc(p.nombre)}"`:''}>
      <td><b>${esc(p.nombre)}</b>${tieneDetalle?' <span class="muted" style="font-size:11px">▸</span>':''}</td>
      <td><span class="pill pill-${p.rol}">${ROL_LABEL[p.rol]||p.rol}</span></td>
      <td><span class="pill pill-${p.rol_en_proyecto}">${p.rol_en_proyecto}</span></td>
      <td style="text-align:center"><b>${arr.length}</b></td>
      <td style="text-align:center">${mes}</td></tr>
    <tr id="det-${p.id}" style="display:none"><td colspan="5" style="background:#FAFBFC;padding:0">
      ${arr.length? `<table style="margin:0"><thead><tr><th style="padding-left:34px">Informe</th><th>Estado</th><th>Fecha</th></tr></thead><tbody>
        ${arr.map(i=>`<tr><td style="padding-left:34px">${esc(i.titulo||'—')}</td><td><span class="pill pill-${i.estado}">${i.estado}</span></td><td class="muted">${(i.fecha_creacion||'').slice(0,10)}</td></tr>`).join('')}
      </tbody></table>` : ''}
    </td></tr>`;
  }).join('');

  $('tBody').innerHTML = metric + `<table><thead><tr>
      <th>Nombre</th><th>Rol</th><th>En proyecto</th>
      <th style="text-align:center">Informes</th><th style="text-align:center">Este mes</th></tr></thead>
    <tbody>${filas}</tbody></table>`;
}

  if(row) row.style.display = row.style.display==='none' ? 'table-row' : 'none';

// Código identificador de un proyecto: RUT de la empresa + slug del proyecto.
// Ej: "77466910-8 / tigo". Único porque el slug es único dentro de cada empresa.
function codProyecto(rut, slug){
  const r = (rut||'').trim(), s = (slug||'').trim();
  if(!r && !s) return '—';
  return r && s ? `${r} / ${s}` : (r || s);
}
function sectionTable({name,sub,tools='',addBtn='',head,rows,emptyIcon,emptyMsg}){

      : `<div class="empty-state"><div class="empty-icon">${emptyIcon}</div>${emptyMsg}</div>`}
  </div>`;
}

    <div class="field"><label>2 · Archivo completado</label>

async function descargarPlantillaUsuarios(btn){
  btn.disabled=true;
  try{
    const r = await fetch('/api/usuarios/plantilla',{ headers: aH() });
    if(!r.ok) throw new Error('No se pudo descargar la plantilla');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='plantilla-usuarios.xlsx'; a.click();
    URL.revokeObjectURL(url);
  }catch(e){ showErr(e.message); } finally{ btn.disabled=false; }
}
async function importarUsuarios(btn){
  const file = $('impFile').files[0];
  if(!file) return showErr('Selecciona el archivo .xlsx completado');
  btn.disabled=true;
  try{
    const dataBase64 = await new Promise((res,rej)=>{
      const fr=new FileReader();
      fr.onload=()=>res(String(fr.result).split(',')[1]);
      fr.onerror=()=>rej(new Error('No se pudo leer el archivo'));
      fr.readAsDataURL(file);
    });
    const r = await api('/api/usuarios/importar',{method:'POST',body:JSON.stringify({dataBase64})});
    const okRows = r.creados.map(c=>`<tr><td>${c.fila}</td><td>${esc(c.nombre)}</td><td class="muted">${esc(c.email)}</td><td><span class="pill pill-${c.rol}">${ROL_LABEL[c.rol]||c.rol}</span></td><td class="muted">${esc(c.password_temporal)}</td></tr>`).join('');
    const errRows = r.errores.map(e=>`<tr><td>${e.fila}</td><td>${esc(e.nombre)}</td><td colspan="3" style="color:#E2445C">${esc(e.error)}</td></tr>`).join('');
    $('impResult').innerHTML = `<div class="hint" style="margin:12px 0 6px">✅ Creados: <b>${r.creados.length}</b> · ❌ Con error: <b>${r.errores.length}</b></div>
      ${(okRows||errRows)?`<div style="max-height:240px;overflow:auto;border:1px solid #E6E9EF;border-radius:8px">
        <table style="margin:0"><thead><tr><th>Fila</th><th>Nombre</th><th>Email / Detalle</th><th>Rol</th><th>Clave temp.</th></tr></thead>
        <tbody>${okRows}${errRows}</tbody></table></div><div class="hint" style="margin-top:6px">Entrega a cada usuario su email y clave temporal; deberá cambiarla al ingresar.</div>`:''}`;
    if(r.creados.length){ toast(`${r.creados.length} usuario(s) creado(s)`,'ok'); window._usuarios=null; }
    btn.disabled=false;
  }catch(e){ showErr(e.message); btn.disabled=false; }
}

    ME = usuario;
    $('brandRol').textContent = ROL_LABEL[ME.rol]||ME.rol;
    $('sbAvatar').textContent = initials(ME.nombre);
    $('sbUname').textContent = ME.nombre;
    $('sbUrol').textContent = ROL_LABEL[ME.rol]||ME.rol;
    buildSidebar();
    // Abre la sección del hash si es válida para el rol; si no, dashboard
    const hash = location.hash.slice(1);
    const detEmp = hash.match(/^empresa:(.+)$/);
    if (detEmp && ME.rol === 'superadmin') {
      document.querySelectorAll('.sb-item').forEach(b=>b.classList.toggle('active',b.dataset.view==='empresas'));
      verEmpresa(detEmp[1]);
    } else {
      const permitido = (MENU[ME.rol]||[]).includes(hash);
      go(permitido ? hash : 'dashboard');
    }
  }catch(e){ /* api() ya redirige en 401 */ }
})();
</script>
</body>
</html>
