<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gestión de Personal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Poppins',system-ui,sans-serif;background:#F6F7FB;color:#323338;min-height:100vh;}

/* ── HEADER ── */
header{
  background:#1C1F3B;padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}
.hdr-left{display:flex;align-items:center;gap:12px;}
.back-btn{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  color:#fff;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:.15s;text-decoration:none;display:flex;align-items:center;gap:6px;
}
.back-btn:hover{background:rgba(255,255,255,.18);}
.hdr-title{font-size:15px;font-weight:700;color:#fff;}
.hdr-user{font-size:11px;color:rgba(255,255,255,.45);font-weight:500;}

/* ── HERO ── */
.hero{
  background:linear-gradient(135deg,#1C1F3B,#2D3060);
  padding:32px 20px 40px;text-align:center;
}
.hero h1{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px;}
.hero p{font-size:13px;color:rgba(255,255,255,.55);}
.rol-badge{
  display:inline-block;margin-top:12px;
  padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;
}
.badge-superadmin{background:rgba(255,180,0,.2);color:#ffd000;border:1px solid rgba(255,210,0,.3);}
.badge-admin_empresa{background:rgba(0,115,234,.2);color:#5aafff;border:1px solid rgba(0,115,234,.3);}
.badge-supervisor{background:rgba(0,200,117,.15);color:#00C875;border:1px solid rgba(0,200,117,.25);}

/* ── MAIN ── */
main{max-width:780px;margin:0 auto;padding:24px 16px 60px;}

/* ── SECTION ── */
.section{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);margin-bottom:20px;overflow:hidden;}
.sec-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;border-bottom:1px solid #E6E9EF;
}
.sec-title{display:flex;align-items:center;gap:10px;}
.sec-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.si-blue{background:#EEF5FF;}
.si-green{background:#EDFFF6;}
.sec-name{font-size:15px;font-weight:700;color:#323338;}
.sec-count{font-size:11px;color:#676879;margin-top:1px;}
.btn-add{
  padding:8px 16px;border-radius:8px;border:none;cursor:pointer;
  font-size:12px;font-weight:700;font-family:inherit;
  display:flex;align-items:center;gap:5px;transition:.15s;
}
.btn-add.blue{background:#0073EA;color:#fff;}
.btn-add.green{background:#00C875;color:#fff;}
.btn-add:hover{opacity:.85;}
.btn-add:disabled{opacity:.4;cursor:not-allowed;}

/* ── LIST ── */
.person-list{padding:8px 12px;}
.person-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 8px;border-bottom:1px solid #F0F1F5;gap:12px;
}
.person-item:last-child{border-bottom:none;}
.person-info{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
.person-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;
}
.av-blue{background:#0073EA;}
.av-green{background:#00C875;}
.person-name{font-size:13px;font-weight:600;color:#323338;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.person-email{font-size:11px;color:#676879;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-del{
  background:#fef2f2;color:#E2445C;border:1px solid #fca5a5;
  border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:.15s;
}
.btn-del:hover{background:#fee2e2;}
.empty-state{padding:32px;text-align:center;color:#676879;font-size:13px;}
.empty-icon{font-size:32px;margin-bottom:8px;}

/* ── MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:200;align-items:center;justify-content:center;padding:20px;
}
.modal-bg.open{display:flex;}
.modal{
  background:#fff;border-radius:16px;width:100%;max-width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);padding:28px 24px;
}
.modal h3{font-size:17px;font-weight:800;color:#323338;margin-bottom:6px;}
.modal-sub{font-size:13px;color:#676879;margin-bottom:22px;}
.field{margin-bottom:14px;}
.field label{font-size:12px;font-weight:600;color:#676879;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;}
.field input,.field select{
  width:100%;border:1.5px solid #E6E9EF;border-radius:8px;
  padding:10px 13px;font-size:14px;color:#323338;font-family:inherit;
  background:#fff;outline:none;transition:.15s;
}
.field input:focus,.field select:focus{border-color:#0073EA;box-shadow:0 0 0 3px rgba(0,115,234,.1);}
.modal-err{font-size:12px;color:#E2445C;margin-bottom:12px;display:none;}
.modal-actions{display:flex;gap:10px;margin-top:8px;}
.btn-cancel{flex:1;padding:11px;border-radius:8px;border:1.5px solid #E6E9EF;background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#676879;transition:.15s;}
.btn-cancel:hover{background:#F6F7FB;}
.btn-confirm{flex:2;padding:11px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;background:#0073EA;transition:.15s;}
.btn-confirm:hover{background:#005bb5;}
.btn-confirm:disabled{opacity:.5;cursor:not-allowed;}

/* ── CONFIRM DEL ── */
.confirm-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center;padding:20px;}
.confirm-bg.open{display:flex;}
.confirm-box{background:#fff;border-radius:14px;max-width:360px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.confirm-box h4{font-size:16px;font-weight:800;color:#323338;margin-bottom:8px;}
.confirm-box p{font-size:13px;color:#676879;margin-bottom:20px;line-height:1.6;}
.confirm-actions{display:flex;gap:10px;}
.btn-no{flex:1;padding:10px;border-radius:8px;border:1.5px solid #E6E9EF;background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-yes-del{flex:2;padding:10px;border-radius:8px;border:none;background:#E2445C;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#323338;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;
  opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{background:#00C875;}
#toast.err{background:#E2445C;}
</style>
</head>
<body>

<script>
(function(){
  const token = localStorage.getItem('token') || sessionStorage.getItem('token');
  if (!token) { window.location.replace('/login'); throw ''; }
  fetch('/auth/me', { headers: { Authorization: 'Bearer ' + token } })
    .then(r => { if (!r.ok) { localStorage.removeItem('token'); sessionStorage.removeItem('token'); window.location.replace('/login'); } })
    .catch(() => window.location.replace('/login'));
})();
</script>

<header>
  <div class="hdr-left">
    <a href="/selector" class="back-btn">← Volver</a>
    <span class="hdr-title">Gestión de Personal</span>
  </div>
  <span class="hdr-user" id="hdrUser">—</span>
</header>

<div class="hero">
  <h1>Personal del sistema</h1>
  <p>Administra supervisores y técnicos de tu equipo</p>
  <div class="rol-badge" id="rolBadge"></div>
</div>

<main>

  <!-- SUPERVISORES -->
  <div class="section" id="secSupervisores">
    <div class="sec-head">
      <div class="sec-title">
        <div class="sec-icon si-blue">👤</div>
        <div>
          <div class="sec-name">Supervisores</div>
          <div class="sec-count" id="countSup">—</div>
        </div>
      </div>
      <button class="btn-add blue" id="btnAddSup" onclick="openModal('supervisor')" style="display:none">+ Agregar</button>
    </div>
    <div class="person-list" id="listSup"><div class="empty-state"><div class="empty-icon">👥</div><p>Cargando...</p></div></div>
  </div>

  <!-- TECNICOS -->
  <div class="section">
    <div class="sec-head">
      <div class="sec-title">
        <div class="sec-icon si-green">🔧</div>
        <div>
          <div class="sec-name">Técnicos</div>
          <div class="sec-count" id="countTec">—</div>
        </div>
      </div>
      <button class="btn-add green" id="btnAddTec" onclick="openModal('tecnico')">+ Agregar</button>
    </div>
    <div class="person-list" id="listTec"><div class="empty-state"><div class="empty-icon">🔧</div><p>Cargando...</p></div></div>
  </div>

</main>

<!-- MODAL AGREGAR -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">Agregar</h3>
    <p class="modal-sub" id="modalSub">Completa los datos para crear el acceso al sistema.</p>
    <div class="field"><label>Nombre completo</label><input type="text" id="inNombre" placeholder="Juan Pérez" autocomplete="off"></div>
    <div class="field"><label>Correo electrónico</label><input type="email" id="inEmail" placeholder="correo@dominio.com" autocomplete="off"></div>
    <div class="field"><label>Contraseña temporal</label><input type="password" id="inPass" placeholder="Mínimo 6 caracteres"></div>
    <div class="modal-err" id="modalErr"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" id="btnConfirm" onclick="crearUsuario()">Crear cuenta</button>
    </div>
  </div>
</div>

<!-- CONFIRM ELIMINAR -->
<div class="confirm-bg" id="confirmBg">
  <div class="confirm-box">
    <h4>¿Eliminar usuario?</h4>
    <p id="confirmMsg">Esta acción no se puede deshacer.</p>
    <div class="confirm-actions">
      <button class="btn-no" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-yes-del" onclick="confirmarEliminar()">Sí, eliminar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const T = () => localStorage.getItem('token') || sessionStorage.getItem('token') || '';
const aH = (x={}) => ({ Authorization: 'Bearer ' + T(), ...x });
const $ = id => document.getElementById(id);

let miRol = '';
let pendingDelId = null;
let modalRol = '';

function toast(msg, type='ok') {
  const el = $('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(el._t); el._t = setTimeout(() => el.className = '', 2500);
}

// ── Cargar perfil ──
async function init() {
  const r = await fetch('/auth/me', { headers: aH() });
  if (!r.ok) { window.location.replace('/login'); return; }
  const { usuario } = await r.json();
  miRol = usuario.rol;
  $('hdrUser').textContent = usuario.nombre;

  const badges = { superadmin:'badge-superadmin', admin_empresa:'badge-admin_empresa', supervisor:'badge-supervisor' };
  const labels = { superadmin:'Superadmin', admin_empresa:'Administrador', supervisor:'Supervisor' };
  const badge = $('rolBadge');
  badge.textContent = labels[miRol] || miRol;
  badge.className = 'rol-badge ' + (badges[miRol] || '');

  // Mostrar botón de supervisores solo si admin o superadmin
  if (miRol === 'superadmin' || miRol === 'admin_empresa') {
    $('btnAddSup').style.display = 'flex';
  }

  // Redirigir técnicos — no tienen acceso a esta página
  if (miRol === 'tecnico') {
    window.location.replace('/selector');
    return;
  }

  await cargarPersonal();
}

// ── Cargar listas ──
async function cargarPersonal() {
  const r = await fetch('/auth/personal', { headers: aH() });
  if (!r.ok) { toast('Error al cargar personal', 'err'); return; }
  const personal = await r.json();

  const sups = personal.filter(p => p.rol === 'supervisor');
  const tecs = personal.filter(p => p.rol === 'tecnico');

  $('countSup').textContent = sups.length + ' supervisor' + (sups.length !== 1 ? 'es' : '');
  $('countTec').textContent = tecs.length + ' técnico' + (tecs.length !== 1 ? 's' : '');

  renderLista('listSup', sups, 'av-blue');
  renderLista('listTec', tecs, 'av-green');
}

function renderLista(containerId, items, avatarClass) {
  const el = $(containerId);
  if (!items.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><p>No hay usuarios en este rol aún.</p></div>';
    return;
  }
  el.innerHTML = items.map(p => {
    const initials = p.nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const delBtn = miRol === 'superadmin'
      ? `<button class="btn-del" onclick="pedirEliminar('${p.id}','${p.nombre.replace(/'/g,"\\'")}')">Eliminar</button>`
      : '';
    return `
      <div class="person-item">
        <div class="person-info">
          <div class="person-avatar ${avatarClass}">${initials}</div>
          <div>
            <div class="person-name">${p.nombre}</div>
          </div>
        </div>
        ${delBtn}
      </div>`;
  }).join('');
}

// ── Modal agregar ──
function openModal(rol) {
  modalRol = rol;
  $('modalTitle').textContent = rol === 'supervisor' ? 'Agregar Supervisor' : 'Agregar Técnico';
  $('modalSub').textContent = `Se creará una cuenta de acceso con rol ${rol}.`;
  $('inNombre').value = ''; $('inEmail').value = ''; $('inPass').value = '';
  $('modalErr').style.display = 'none';
  $('modalBg').classList.add('open');
  setTimeout(() => $('inNombre').focus(), 100);
}
function closeModal() { $('modalBg').classList.remove('open'); }

async function crearUsuario() {
  const nombre = $('inNombre').value.trim();
  const email  = $('inEmail').value.trim();
  const pass   = $('inPass').value;
  const errEl  = $('modalErr');

  if (!nombre || !email || !pass) { errEl.textContent = 'Todos los campos son requeridos.'; errEl.style.display = 'block'; return; }
  if (pass.length < 6) { errEl.textContent = 'La contraseña debe tener al menos 6 caracteres.'; errEl.style.display = 'block'; return; }

  const btn = $('btnConfirm'); btn.disabled = true; btn.textContent = 'Creando...';
  errEl.style.display = 'none';

  try {
    const r = await fetch('/auth/crear-usuario', {
      method: 'POST',
      headers: aH({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ nombre, email, password: pass, rol: modalRol })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Error al crear usuario');
    closeModal();
    toast(`✓ ${modalRol === 'supervisor' ? 'Supervisor' : 'Técnico'} creado correctamente`, 'ok');
    await cargarPersonal();
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Crear cuenta';
  }
}

// ── Eliminar ──
function pedirEliminar(id, nombre) {
  pendingDelId = id;
  $('confirmMsg').textContent = `"${nombre}" será eliminado del sistema permanentemente.`;
  $('confirmBg').classList.add('open');
}
function closeConfirm() { $('confirmBg').classList.remove('open'); pendingDelId = null; }

async function confirmarEliminar() {
  if (!pendingDelId) return;
  const id = pendingDelId; closeConfirm();
  try {
    const r = await fetch(`/auth/usuarios/${id}`, { method:'DELETE', headers:aH() });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Error al eliminar');
    toast('Usuario eliminado', 'ok');
    await cargarPersonal();
  } catch(e) { toast(e.message, 'err'); }
}

$('modalBg').addEventListener('click', e => { if(e.target === $('modalBg')) closeModal(); });
$('confirmBg').addEventListener('click', e => { if(e.target === $('confirmBg')) closeConfirm(); });

init();
</script>
</body>
</html>
