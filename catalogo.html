<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Catálogo de sitios – GestiónTécnica</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/theme.css">
<script src="/searchable-select.js" defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:#F0F2F8;color:#0F172A;min-height:100vh;}

header{background:#1C1F3B;padding:0 24px;min-height:66px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;overflow:hidden;border-bottom:1px solid rgba(255,255,255,.06);box-shadow:0 2px 16px rgba(28,31,59,.28);}
header::after{content:'';position:absolute;left:0;right:0;bottom:0;height:3px;background:#0073EA;}
.h-left{display:flex;align-items:center;gap:14px;position:relative;z-index:1;}
.h-back{color:rgba(255,255,255,.6);font-size:12px;font-weight:600;text-decoration:none;border:1px solid rgba(255,255,255,.18);padding:6px 13px;border-radius:8px;transition:.15s;display:inline-flex;align-items:center;gap:5px;}
.h-back:hover{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.3);}
.h-divider{width:1px;height:30px;background:rgba(255,255,255,.14);}
.h-icon{width:38px;height:38px;border-radius:10px;background:#0073EA;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,115,234,.4);flex-shrink:0;}
.h-icon svg{width:20px;height:20px;display:block;}
.h-titles{display:flex;flex-direction:column;gap:1px;}
.h-name{font-size:16px;font-weight:800;color:#fff;letter-spacing:.01em;line-height:1.15;}
.h-sub{font-size:11px;font-weight:500;color:rgba(255,255,255,.55);letter-spacing:.02em;}
@media(max-width:560px){.h-sub,.h-divider{display:none;}}

.main{max-width:980px;margin:0 auto;padding:24px 16px 60px;}
.card{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-md);border:1px solid var(--border);overflow:hidden;}
.toolbar{padding:16px 20px;border-bottom:1px solid #F0F1F5;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.search{flex:1;min-width:200px;position:relative;}
.search input{width:100%;border:1.5px solid #E2E8F0;border-radius:9px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;background:#F6F7FB;transition:.15s;}
.search input:focus{border-color:#0073EA;background:#fff;}
.count{font-size:12px;color:#64748B;font-weight:500;white-space:nowrap;}
.btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:9px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn-primary{background:#0073EA;color:#fff;}
.btn-primary:hover{opacity:.88;}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;}
.btn-ghost{background:#fff;border:1.5px solid #E2E8F0;color:#64748B;}

.tbl-wrap{max-height:64vh;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{position:sticky;top:0;background:#F8F9FC;padding:10px 16px;font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid #E2E8F0;z-index:1;}
tbody td{padding:9px 16px;border-bottom:1px solid #F6F7FB;color:#0F172A;}
tbody tr:hover{background:#FAFBFF;}
.td-sitio{font-weight:600;}
.td-dir{color:#64748B;font-size:12px;}
.chk{width:16px;height:16px;cursor:pointer;accent-color:#0073EA;}
.empty{padding:40px;text-align:center;color:#9ba1b0;font-size:13px;}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(28,31,59,.55);z-index:300;align-items:center;justify-content:center;padding:20px;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:14px;width:100%;max-width:440px;max-height:84vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-head{padding:18px 22px;border-bottom:1px solid #F0F1F5;font-size:15px;font-weight:700;}
.modal-body{padding:12px 22px;overflow-y:auto;}
.modal-foot{padding:14px 22px;border-top:1px solid #F0F1F5;display:flex;justify-content:flex-end;gap:10px;}
.proj-opt{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:8px;cursor:pointer;}
.proj-opt:hover{background:#F6F7FB;}
.proj-opt .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.proj-opt .nm{font-size:13px;font-weight:600;}
.proj-opt .meta{font-size:11px;color:#9ba1b0;margin-left:auto;}

.btn-green{background:#059669;color:#fff;}
.fld{margin-bottom:12px;}
.fld label{display:block;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.fld input{width:100%;border:1.5px solid #E2E8F0;border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;outline:none;}
.fld input:focus{border-color:#0073EA;}
.hint{font-size:12px;color:#64748B;line-height:1.5;}
.dup{border:1px solid #E2E8F0;border-radius:10px;padding:10px 12px;margin-top:10px;}
.dup-t{font-weight:700;font-size:13px;margin-bottom:8px;}
.dup-cmp{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.dup-opt{display:flex;gap:8px;align-items:flex-start;border:1.5px solid #E2E8F0;border-radius:8px;padding:9px 10px;cursor:pointer;font-size:13px;}
.dup-opt:has(input:checked){border-color:#0073EA;background:#F4F9FF;}
.dup-d{font-size:11px;color:#64748B;margin-top:2px;}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#0F172A;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:.3s;pointer-events:none;z-index:999;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<script>
(function(){
  const t = localStorage.getItem('token') || sessionStorage.getItem('token');
  if (!t) { window.location.replace('/login'); throw ''; }
})();
const TOKEN = () => localStorage.getItem('token') || sessionStorage.getItem('token') || '';
const authH = (x={}) => ({ Authorization: 'Bearer ' + TOKEN(), ...x });
const NIVEL = { superadmin:4, admin_empresa:3, supervisor:2, tecnico:1 };
</script>

<header>
  <div class="h-left">
    <a href="/dashboard" class="ui-home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio</a>
    <div class="h-divider"></div>
    <div class="h-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    </div>
    <div class="h-titles">
      <span class="h-name">Catálogo de sitios</span>
      <span class="h-sub">Gestión de sitios, comunas y direcciones</span>
    </div>
  </div>
</header>

<div class="main">
  <div class="card">
    <div class="toolbar">
      <div class="search"><input id="q" type="text" placeholder="Buscar por sitio, comuna o dirección…" oninput="render()"></div>
      <span class="count" id="count">0 sitios</span>
      <button class="btn btn-ghost" id="btnNuevoSitio" onclick="modalNuevoSitio()" style="display:none">＋ Nuevo sitio</button>
      <button class="btn btn-ghost" id="btnCargaSitios" onclick="modalCargaSitios()" style="display:none">📥 Carga masiva</button>
      <button class="btn btn-primary" id="btnAsignar" onclick="abrirModal()" disabled style="display:none">Asignar a proyectos</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:34px"><input type="checkbox" class="chk" id="chkAll" onchange="toggleAll(this)"></th>
          <th>Sitio</th><th>Comuna</th><th>Dirección</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none">No hay sitios que coincidan.</div>
    </div>
  </div>
</div>

<!-- Modal de proyectos -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-head">Asignar <span id="modalN">0</span> sitio(s) a:</div>
    <div class="modal-body" id="modalProyectos"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" id="btnConfirmar" onclick="confirmarAsignacion()">Asignar</button>
    </div>
  </div>
</div>

<!-- Modal genérico (nuevo sitio / carga masiva / duplicados) -->
<div class="modal-bg" id="modal2"><div class="modal" id="modal2box"></div></div>

<div id="toast"></div>

<script>
let SITIOS = [];        // catálogo completo
let PROYECTOS = [];     // proyectos del usuario
let seleccion = new Set(); // índices seleccionados (sobre SITIOS)
let puedeAsignar = false;

function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.className='show'; clearTimeout(el._t); el._t=setTimeout(()=>el.className='',2600); }

async function init(){
  try{
    const me = await fetch('/auth/me', { headers: authH() });
    if(!me.ok){ window.location.replace('/login'); return; }
    const { usuario } = await me.json();
    puedeAsignar = (NIVEL[usuario.rol]||0) >= 3;
    if(puedeAsignar){
      document.getElementById('btnAsignar').style.display='inline-flex';
      document.getElementById('btnNuevoSitio').style.display='inline-flex';
      document.getElementById('btnCargaSitios').style.display='inline-flex';
    }

    const [sR, pR] = await Promise.all([
      fetch('/api/sitios-preventivos', { headers: authH() }),
      fetch('/api/proyectos', { headers: authH() })
    ]);
    SITIOS = sR.ok ? await sR.json() : [];
    PROYECTOS = pR.ok ? await pR.json() : [];
    render();
  }catch(e){ toast('Error: '+e.message); }
}

function filtrados(){
  const q = (document.getElementById('q').value||'').trim().toLowerCase();
  return SITIOS
    .map((s,i)=>({s,i}))
    .filter(({s})=> !q || (s.nombre+' '+(s.ciudad||'')+' '+(s.direccion||'')).toLowerCase().includes(q));
}

function render(){
  const rows = filtrados();
  const tb = document.getElementById('tbody');
  tb.innerHTML = rows.map(({s,i})=>`
    <tr>
      <td><input type="checkbox" class="chk" data-i="${i}" ${seleccion.has(i)?'checked':''} onchange="toggleOne(this)"></td>
      <td class="td-sitio">${esc(s.nombre)}</td>
      <td>${esc(s.ciudad||'—')}</td>
      <td class="td-dir">${esc(s.direccion||'—')}</td>
    </tr>`).join('');
  document.getElementById('empty').style.display = rows.length?'none':'block';
  document.getElementById('count').textContent =
    seleccion.size ? `${seleccion.size} seleccionados · ${rows.length} sitios` : `${rows.length} sitios`;
  document.getElementById('btnAsignar').disabled = !(puedeAsignar && seleccion.size);
  const all = rows.length && rows.every(({i})=>seleccion.has(i));
  document.getElementById('chkAll').checked = !!all;
}

function toggleOne(cb){ const i=+cb.dataset.i; cb.checked?seleccion.add(i):seleccion.delete(i); render(); }
function toggleAll(cb){ filtrados().forEach(({i})=> cb.checked?seleccion.add(i):seleccion.delete(i)); render(); }

function abrirModal(){
  if(!seleccion.size) return;
  document.getElementById('modalN').textContent = seleccion.size;
  if(!PROYECTOS.length){
    document.getElementById('modalProyectos').innerHTML = '<div class="empty">No tienes proyectos disponibles.</div>';
  } else {
    document.getElementById('modalProyectos').innerHTML = PROYECTOS.map(p=>`
      <label class="proj-opt">
        <input type="checkbox" class="chk" value="${esc(p.slug)}">
        <span class="dot" style="background:${esc(p.color||'#9ba1b0')}"></span>
        <span class="nm">${esc(p.nombre)}</span>
        <span class="meta">${p.totalSitios||0} sitios</span>
      </label>`).join('');
  }
  document.getElementById('modal').classList.add('show');
}
function cerrarModal(){ document.getElementById('modal').classList.remove('show'); }

async function confirmarAsignacion(){
  const slugs = [...document.querySelectorAll('#modalProyectos input:checked')].map(c=>c.value);
  if(!slugs.length){ toast('Elige al menos un proyecto'); return; }
  const sitios = [...seleccion].map(i=>{ const s=SITIOS[i]; return { nombre:s.nombre, direccion:s.direccion||'', comuna:s.ciudad||'' }; });
  const btn = document.getElementById('btnConfirmar'); btn.disabled=true;
  try{
    const r = await fetch('/api/proyectos/sitios/asignar', {
      method:'POST', headers: authH({'Content-Type':'application/json'}),
      body: JSON.stringify({ sitios, slugs })
    });
    const d = await r.json();
    if(!r.ok){ toast(d.error||'Error al asignar'); return; }
    const n = (d.asignados||[]).length;
    toast(`${sitios.length} sitio(s) asignados a ${n} proyecto(s)` + ((d.omitidos&&d.omitidos.length)?` · ${d.omitidos.length} omitidos`:''));
    seleccion.clear(); cerrarModal();
    const pR = await fetch('/api/proyectos', { headers: authH() }); // refresca contadores
    if(pR.ok) PROYECTOS = await pR.json();
    render();
  }catch(e){ toast('Error: '+e.message); }
  finally{ btn.disabled=false; }
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ── Modal genérico + altas de sitios ──────────────────────────────
function openM2(html){ document.getElementById('modal2box').innerHTML = html; document.getElementById('modal2').classList.add('show'); }
function closeM2(){ document.getElementById('modal2').classList.remove('show'); }
function val(id){ const e=document.getElementById(id); return e?(e.value||'').trim():''; }
function fileB64(f){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(String(r.result).split(',')[1]); r.onerror=rej; r.readAsDataURL(f); }); }
async function recargarSitios(){
  const sR = await fetch('/api/sitios-preventivos',{ headers: authH() });
  if(sR.ok){ SITIOS = await sR.json(); seleccion.clear(); render(); }
}

function modalNuevoSitio(){
  openM2(`<div class="modal-head">Nuevo sitio</div>
    <div class="modal-body">
      <div class="fld"><label>Nombre del sitio *</label><input id="nsNombre" placeholder="DATACENTER NEXTREAM ..."></div>
      <div class="fld"><label>Comuna</label><input id="nsComuna" placeholder="Santiago"></div>
      <div class="fld"><label>Dirección</label><input id="nsDir" placeholder="Av. Ejemplo 123"></div>
      <div class="fld"><label>Criticidad</label><input id="nsCrit"></div>
      <div class="fld"><label>Categoría</label><input id="nsCat"></div>
      <div class="fld"><label>Código</label><input id="nsCod"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeM2()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarSitio(this)">Agregar sitio</button>
    </div>`);
  setTimeout(()=>document.getElementById('nsNombre').focus(),60);
}
async function guardarSitio(btn){
  const nombre = val('nsNombre');
  if(!nombre){ toast('El nombre del sitio es obligatorio'); return; }
  const body = { nombre, ciudad:val('nsComuna'), direccion:val('nsDir'),
    criticidad:val('nsCrit'), categoria:val('nsCat'), codigo:val('nsCod') };
  btn.disabled=true;
  try{
    const r = await fetch('/api/sitios-preventivos',{ method:'POST', headers: authH({'Content-Type':'application/json'}), body: JSON.stringify(body) });
    const d = await r.json();
    if(r.status===409){ mostrarDuplicadoUnico(body, d.existente); return; }
    if(!r.ok){ toast(d.error||'Error al guardar'); btn.disabled=false; return; }
    toast('Sitio agregado'); closeM2(); await recargarSitios();
  }catch(e){ toast('Error: '+e.message); btn.disabled=false; }
}

function modalCargaSitios(){
  openM2(`<div class="modal-head">Carga masiva de sitios</div>
    <div class="modal-body">
      <p class="hint">Sube un Excel (.xlsx) con columnas <b>Sitio, Dirección, Comuna, Criticidad, Categoría, Código</b>. Se <b>añaden</b> a los existentes; los repetidos se mostrarán para que elijas cuál dejar.</p>
      <input id="csFile" type="file" accept=".xlsx,.xls" style="margin-top:12px">
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeM2()">Cerrar</button>
      <button class="btn btn-primary" onclick="importarSitios(this)">Importar</button>
    </div>`);
}
async function importarSitios(btn){
  const f = document.getElementById('csFile').files[0];
  if(!f){ toast('Selecciona un archivo'); return; }
  btn.disabled=true;
  try{
    const dataBase64 = await fileB64(f);
    const r = await fetch('/api/sitios-preventivos/importar',{ method:'POST', headers: authH({'Content-Type':'application/json'}), body: JSON.stringify({ dataBase64 }) });
    const d = await r.json();
    if(!r.ok){ toast(d.error||'Error al importar'); btn.disabled=false; return; }
    await recargarSitios();
    if(d.duplicados && d.duplicados.length){ modalDuplicados(d); }
    else { toast(`${d.agregados} sitio(s) agregado(s)`); closeM2(); }
  }catch(e){ toast('Error: '+e.message); btn.disabled=false; }
}

function dupOpt(i, existente, nuevo){
  return `<div class="dup-cmp">
    <label class="dup-opt"><input type="radio" name="dup${i}" value="omitir" checked>
      <div><b>Mantener actual</b><div class="dup-d">${esc(existente.ciudad||'—')} · ${esc(existente.direccion||'—')}</div></div></label>
    <label class="dup-opt"><input type="radio" name="dup${i}" value="reemplazar">
      <div><b>Usar el nuevo</b><div class="dup-d">${esc(nuevo.ciudad||'—')} · ${esc(nuevo.direccion||'—')}</div></div></label>
  </div>`;
}
function modalDuplicados(d){
  window._dups = d.duplicados;
  const rows = d.duplicados.map((p,i)=>`<div class="dup"><div class="dup-t">${esc(p.nuevo.nombre)}</div>${dupOpt(i,p.existente,p.nuevo)}</div>`).join('');
  openM2(`<div class="modal-head">${d.duplicados.length} sitio(s) repetido(s)</div>
    <div class="modal-body">
      <p class="hint"><b>${d.agregados}</b> sitio(s) nuevo(s) agregado(s). Los siguientes ya existían con la misma información. Elige cuál dejar:</p>
      ${rows}
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeM2()">Dejar como está</button>
      <button class="btn btn-primary" onclick="resolverDuplicados(this)">Aplicar elección</button>
    </div>`);
}
function mostrarDuplicadoUnico(nuevo, existente){
  window._dups = [{ nuevo, existente }];
  openM2(`<div class="modal-head">Sitio repetido</div>
    <div class="modal-body">
      <p class="hint">Ya existe un sitio con la misma información (<b>${esc(nuevo.nombre)}</b>). Elige cuál dejar:</p>
      <div class="dup">${dupOpt(0, existente, nuevo)}</div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeM2()">Cancelar</button>
      <button class="btn btn-primary" onclick="resolverDuplicados(this)">Aplicar</button>
    </div>`);
}
async function resolverDuplicados(btn){
  const decisiones = (window._dups||[]).map((p,i)=>({
    nuevo: p.nuevo,
    accion: (document.querySelector(`input[name="dup${i}"]:checked`)||{}).value || 'omitir'
  }));
  btn.disabled=true;
  try{
    const r = await fetch('/api/sitios-preventivos/resolver',{ method:'POST', headers: authH({'Content-Type':'application/json'}), body: JSON.stringify({ decisiones }) });
    const d = await r.json();
    if(!r.ok){ toast(d.error||'Error'); btn.disabled=false; return; }
    toast(d.reemplazados ? `${d.reemplazados} sitio(s) reemplazado(s)` : 'Sin cambios');
    closeM2(); await recargarSitios();
  }catch(e){ toast('Error: '+e.message); btn.disabled=false; }
}

init();
</script>
</body>
</html>
