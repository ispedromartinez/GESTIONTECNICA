<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',system-ui,sans-serif;}
body{background:#F6F7FB;min-height:100vh;}
header{background:#1C1F3B;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
header h1{color:#fff;font-size:16px;font-weight:700;}
header a{color:rgba(255,255,255,.7);font-size:12px;text-decoration:none;}
main{padding:24px;max-width:1200px;margin:0 auto;}

.filtros{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.filtros button{background:#fff;border:1px solid #D0D4E0;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px;}
.filtros button:hover{background:#EEF1FA;}
#semanaLabel{font-size:13px;font-weight:600;color:#323338;min-width:170px;text-align:center;}
.filtros select{padding:6px 10px;border:1px solid #D0D4E0;border-radius:6px;font-size:13px;}

.toolbar{display:flex;gap:8px;margin-bottom:12px;}
.toolbar button{background:#0073EA;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;}
.toolbar button:hover{opacity:.88;}
.toolbar button.danger{background:#D83A52;}
.toolbar button:disabled{background:#C5C7D0;cursor:not-allowed;}

.dropdown{position:relative;display:inline-block;}
.dropdown-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid #D0D4E0;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.12);min-width:280px;z-index:40;padding:6px 0;}
.dropdown-menu.open{display:block;}
.dropdown-menu hr{border:none;border-top:1px solid #EEF0F4;margin:6px 0;}
#herramientasMenu .dd-item{display:block;width:100%;text-align:left;background:none;border:none;padding:9px 16px;font-size:13px;font-weight:400;color:#323338;cursor:pointer;}
#herramientasMenu .dd-item:hover:not(:disabled){background:#F0F2F8;}
#herramientasMenu .dd-item:disabled{background:none;color:#C5C7D0;cursor:not-allowed;}

table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid #EEF0F4;}
th{background:#F0F2F8;color:#676879;font-weight:600;font-size:11px;text-transform:uppercase;}
tbody tr{cursor:pointer;}
tbody tr:hover{background:#F6F8FC;}
tbody tr.selected{background:#E6F0FF;}
tbody tr.destacada{background:#FFF7E0;}
tbody tr.destacada:hover{background:#FFF1C8;}
.bell{cursor:pointer;font-size:16px;user-select:none;}
.estado-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;}

.estado-En-Progreso{background:#FFF1C8;color:#9A6B00;}
.estado-Cerrado{background:#D4F4E2;color:#1E9E5A;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);align-items:center;justify-content:center;z-index:50;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:10px;padding:0;width:560px;max-width:92vw;max-height:88vh;display:flex;flex-direction:column;}

// ── Auth (sesión JWT del sistema) ───────────────────────────────
const TOKEN = () => localStorage.getItem('token') || sessionStorage.getItem('token') || '';
if (!TOKEN()) location.replace('/login');
// Adjunta el Bearer token automáticamente a todas las llamadas internas.
const _origFetch = window.fetch.bind(window);
window.fetch = (url, opts = {}) => {
  const headers = new Headers(opts.headers || {});
  if (!headers.has('Authorization')) headers.set('Authorization', 'Bearer ' + TOKEN());
  return _origFetch(url, { ...opts, headers });
};
// Descarga autenticada (reemplaza la navegación directa, que no puede mandar el token).
async function descargarAuth(url, fallbackName) {
  const r = await fetch(url);
  if (!r.ok) { alert('No se pudo descargar (¿sesión expirada?).'); return; }
  const blob = await r.blob();
  const cd = r.headers.get('Content-Disposition') || '';
  const m = cd.match(/filename="?([^"]+)"?/);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (m && m[1]) || fallbackName;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function lunesDeEstaSemana(d){
  const dia = d.getDay();
  const offset = dia === 0 ? -6 : 1 - dia;
  const lunes = new Date(d);
  lunes.setDate(d.getDate() + offset);
  lunes.setHours(0,0,0,0);
  return lunes;
}
function isoFecha(d){ return d.toISOString().slice(0,10); }

// Sistema 1 (estandar Excel/America): semana 1 = la que contiene el 1 de enero,
// semanas empiezan domingo. Distinto del ISO 8601 que usa fSemanaIso.
function numeroSemanaExcel(date){
  const jan1 = new Date(date.getFullYear(), 0, 1);
  const dayOfYear = Math.floor((date - jan1) / 86400000) + 1;
  const jan1Dow = jan1.getDay();
  return Math.ceil((dayOfYear + jan1Dow) / 7);
}
function inicioSemanaExcel(year, semana){
  const jan1 = new Date(year, 0, 1);
  const jan1Dow = jan1.getDay();
  const inicioSemana1 = new Date(year, 0, 1 - jan1Dow);
  const inicio = new Date(inicioSemana1);
  inicio.setDate(inicioSemana1.getDate() + (semana - 1) * 7);
  return inicio;
}
function poblarSelectorSemanas(){
  const sel = document.getElementById('filtroSemanaSel');
  const hoy = new Date();
  const year = hoy.getFullYear();
  const semanaActualNum = numeroSemanaExcel(hoy);
  let html = '<option value="">Elegir semana...</option>';
  for (let w = 1; w <= semanaActualNum; w++){
    const inicio = inicioSemanaExcel(year, w);
    const fin = new Date(inicio); fin.setDate(fin.getDate() + 6);
    const fmt = x => x.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit'});
    html += `<option value="${year}-${w}">Semana ${w} (${fmt(inicio)} – ${fmt(fin)})</option>`;
  }
  sel.innerHTML = html;
}

function semanaIsoDeFecha(fechaStr){
  if (!fechaStr) return '';
  const d = new Date(fechaStr + 'T00:00:00');
  const diaIso = (d.getDay() + 6) % 7; // lunes=0 ... domingo=6
  const jueves = new Date(d);
  jueves.setDate(d.getDate() - diaIso + 3); // jueves de esa semana
  const primerJueves = new Date(jueves.getFullYear(), 0, 4);
  const diaIsoPrimerJueves = (primerJueves.getDay() + 6) % 7;
  primerJueves.setDate(primerJueves.getDate() - diaIsoPrimerJueves + 3);
  const semana = 1 + Math.round((jueves - primerJueves) / (7 * 24 * 60 * 60 * 1000));
  return `${jueves.getFullYear()}-W${String(semana).padStart(2,'0')}`;
}

function seleccionarSitioPreventivo(nombre){

}
function filtrarSitios(q){
  const dd = document.getElementById('sitioDD');
  document.getElementById('fNombreCliente').value = q;
  if (!q) { dd.style.display = 'none'; return; }
  const nq = q.toLowerCase();
  const matches = SITIOS_PREVENTIVO.filter(s => s.nombre.toLowerCase().includes(nq)).slice(0, 30);
  if (!matches.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = matches.map(s =>
    `<div class="sitio-opt" data-nombre="${s.nombre.replace(/"/g,'&quot;')}" style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #F0F2F8;">${s.nombre}</div>`
  ).join('');
  dd.querySelectorAll('.sitio-opt').forEach(el => {
    el.addEventListener('mousedown', e => { e.preventDefault(); seleccionarSitioPreventivo(el.dataset.nombre); });
  });
  dd.style.display = 'block';
}
document.getElementById('fNombreClienteInput').addEventListener('input', e => filtrarSitios(e.target.value));

async function cargarTareas(){
  const tecnico = document.getElementById('filtroTecnico').value;
  const params = new URLSearchParams();
  if (modoRango) {
    const desde = document.getElementById('filtroDesde').value;
    const hasta = document.getElementById('filtroHasta').value;
    if (desde) params.set('desde', desde);
    if (hasta) params.set('hasta', hasta);
  }
  if (tecnico && tecnico !== 'Todos') params.set('tecnico', tecnico);
  const res = await fetch('/tareas?' + params.toString());
  tareas = await res.json();
  paginaActual = 1;
  seleccionMultiple.clear();
  renderTabla();
}

function renderTabla(){
  const totalPaginas = Math.max(1, Math.ceil(tareas.length / tareasPorPagina));
  if (paginaActual > totalPaginas) paginaActual = totalPaginas;
  const inicio = (paginaActual - 1) * tareasPorPagina;
  const pagina = tareas.slice(inicio, inicio + tareasPorPagina);

  document.getElementById('paginaLabel').textContent = `Página ${paginaActual} de ${totalPaginas} (${tareas.length} tarea${tareas.length===1?'':'s'})`;
  document.getElementById('btnPaginaPrev').disabled = paginaActual <= 1;
  document.getElementById('btnPaginaNext').disabled = paginaActual >= totalPaginas;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = pagina.map(t => `
    <tr data-id="${t.id}" class="${t.id===seleccionId?'selected':''} ${t.destacada?'destacada':''}">
      <td><input type="checkbox" class="rowCheck" data-check="${t.id}" ${seleccionMultiple.has(t.id)?'checked':''}></td>
      <td>${t.tecnico||''}</td>
      <td>${t.sitio||''}</td>
      <td>${t.sala||''}</td>
      <td>${t.descripcion||''}</td>
      <td>${t.fechaInicio||''}</td>
      <td>${t.fechaVencimiento||''}</td>
      <td><span class="estado-badge estado-${(t.estado||'Nuevo').replace(' ','-')}">${t.estado||'Nuevo'}</span></td>
      <td><span class="bell" data-bell="${t.id}">${t.destacada?'🔔':'🔕'}</span></td>
    </tr>
  `).join('');

  document.getElementById('checkTodos').checked = pagina.length>0 && pagina.every(t=>seleccionMultiple.has(t.id));

  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('click', e => {
      if (e.target.dataset.bell || e.target.classList.contains('rowCheck')) return;
      seleccionId = tr.dataset.id;
      renderTabla();
      actualizarToolbar();
    });
  });
  tbody.querySelectorAll('[data-check]').forEach(el => {
    el.addEventListener('click', e => e.stopPropagation());
    el.addEventListener('change', e => {
      const id = el.dataset.check;
      if (el.checked) seleccionMultiple.add(id); else seleccionMultiple.delete(id);
      document.getElementById('btnBorrarSeleccion').disabled = seleccionMultiple.size === 0;
      document.getElementById('checkTodos').checked = pagina.length>0 && pagina.every(t=>seleccionMultiple.has(t.id));
    });
  });
  tbody.querySelectorAll('[data-bell]').forEach(el => {
    el.addEventListener('click', async e => {
      e.stopPropagation();
      await fetch(`/tareas/${el.dataset.bell}/destacar`, { method: 'POST' });
      cargarTareas();
    });
  });
}

  herramientasMenu.classList.toggle('open');
});
document.addEventListener('click', () => herramientasMenu.classList.remove('open'));

document.getElementById('ddVistaExcel').addEventListener('click', () => {
  const tecnico = document.getElementById('filtroTecnico').value;
  const params = new URLSearchParams();
  if (modoRango) {
    const desde = document.getElementById('filtroDesde').value;
    const hasta = document.getElementById('filtroHasta').value;
    if (desde) params.set('desde', desde);
    if (hasta) params.set('hasta', hasta);
  }
  if (tecnico && tecnico !== 'Todos') params.set('tecnico', tecnico);
  descargarAuth('/tareas/exportar?' + params.toString(), 'tareas-preventivo.xlsx');
  herramientasMenu.classList.remove('open');
});

document.getElementById('ddExportarTareasJson').addEventListener('click', () => {
  descargarAuth('/tareas/backup', 'tareas-backup.json');
  herramientasMenu.classList.remove('open');
});

const fileImportar = document.getElementById('fileImportar');
const importarOverlay = document.getElementById('importarOverlay');
const importarFileLabel = document.getElementById('importarFileLabel');

document.getElementById('ddImportarTareas').addEventListener('click', () => {
  herramientasMenu.classList.remove('open');
  fileImportar.value = '';
  importarFileLabel.value = '';
  document.getElementById('importarEncabezados').checked = true;
  importarOverlay.classList.add('open');
});
document.getElementById('btnCancelarImportar').addEventListener('click', () => {
  importarOverlay.classList.remove('open');
});
document.getElementById('btnSeleccionarArchivo').addEventListener('click', () => fileImportar.click());
fileImportar.addEventListener('change', () => {
  const file = fileImportar.files[0];
  importarFileLabel.value = file ? file.name : '';
});

document.getElementById('btnConfirmarImportar').addEventListener('click', async () => {
  const file = fileImportar.files[0];
  if (!file) { alert('Selecciona un archivo primero.'); return; }
  const primeraFilaEncabezados = document.getElementById('importarEncabezados').checked;
  const buffer = await file.arrayBuffer();
  let binary = '';
  const bytes = new Uint8Array(buffer);
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  const dataBase64 = btoa(binary);
  const res = await fetch('/tareas/importar', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ dataBase64, primeraFilaEncabezados })
  });
  const data = await res.json();
  importarOverlay.classList.remove('open');
  if (data.error) { alert('Error al importar: ' + data.error); return; }
  alert(`Se importaron ${data.importadas} tarea(s).`);
  if (data.primeraFechaInicio) {
    const inicio = new Date(data.primeraFechaInicio + 'T00:00:00');
    const lunes = lunesDeEstaSemana(inicio);
    const domingo = new Date(lunes); domingo.setDate(domingo.getDate() + 6);
    document.getElementById('filtroDesde').value = isoFecha(lunes);
    document.getElementById('filtroHasta').value = isoFecha(domingo);
    modoRango = true;
    document.getElementById('btnLimpiarFiltro').style.display = 'inline-block';
  }
  cargarTareas();
});

poblarTecnicos();
poblarSelectorSemanas();
cargarTareas();
</script>
</body>
</html>
